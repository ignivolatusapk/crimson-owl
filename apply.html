<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open a Shop - Crimson Owl</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0a;
        }

        .navbar {
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 16px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-logo img {
            height: 36px;
            width: auto;
        }

        .nav-logo span {
            color: white;
            font-weight: 700;
            font-size: 18px;
        }

        .back-btn {
            color: white;
            text-decoration: none;
            font-size: 14px;
        }

        .container {
            max-width: 550px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        .form-card {
            background: #1a1a1a;
            border-radius: 24px;
            padding: 40px;
            border: 1px solid #333;
        }

        .form-card h1 {
            color: white;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .form-card p {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #ccc;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 14px;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #8B0000;
        }

        .info-box {
            background: #0a0a0a;
            padding: 16px;
            border-radius: 12px;
            margin: 24px 0;
            border: 1px solid #333;
        }

        .info-box p {
            color: #ccc;
            font-size: 13px;
            margin: 6px 0;
        }

        .info-box strong {
            color: #8B0000;
        }

        .btn-submit {
            width: 100%;
            background: #8B0000;
            color: white;
            padding: 14px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
        }

        .btn-submit:hover {
            background: #a00000;
        }

        .message {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
        }

        .message.success {
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid #00ff00;
            color: #00ff00;
        }

        .message.error {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid #ff4444;
            color: #ff4444;
        }

        .footer {
            background: rgba(0, 0, 0, 0.95);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 24px;
            text-align: center;
        }

        .footer p {
            color: #666;
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .container { padding: 30px 16px; }
            .form-card { padding: 24px; }
            .form-card h1 { font-size: 24px; }
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="nav-container">
        <div class="nav-logo">
            <img src="images/logo.png" alt="Crimson Owl Logo">
            <span>CRIMSON OWL</span>
        </div>
        <a href="index.html" class="back-btn">← Back to Home</a>
    </div>
</div>

<div class="container">
    <div class="form-card">
        <h1>Start Your Digital Shop</h1>
        <p>Fill the form. We'll contact you within 24 hours.</p>
        
        <div id="formMessage"></div>
        
        <form id="applyForm">
            <div class="form-group">
                <label>Shop Name</label>
                <input type="text" id="shopName" required placeholder="e.g., Buna Coffee">
            </div>
            
            <div class="form-group">
                <label>Your Name</label>
                <input type="text" id="ownerName" required>
            </div>
            
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>
            
            <div class="form-group">
                <label>Phone</label>
                <input type="tel" id="phone" required>
            </div>
            
            <div class="form-group">
                <label>Category</label>
                <select id="category">
                    <option>Fashion & Clothing</option>
                    <option>Food & Restaurant</option>
                    <option>Electronics</option>
                    <option>Handicrafts & Art</option>
                    <option>Home & Living</option>
                    <option>Beauty & Health</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Description</label>
                <textarea id="description" rows="4" required placeholder="What do you sell? Describe your products..."></textarea>
            </div>
            
            <div class="info-box">
                <p><strong>💰 Total: 1,500 ETB</strong></p>
                <p>Setup Fee: 1,000 ETB (one-time)</p>
                <p>Monthly Rent: 500 ETB</p>
            </div>
            
            <button type="submit" class="btn-submit">Submit Application</button>
        </form>
    </div>
</div>

<div class="footer">
    <p>© 2024 Crimson Owl | Digital Shops Directory</p>
</div>

<script>
    // Your Formspree ID
    const FORMSPREE_ID = 'mlgzlbak';
    
    document.getElementById('applyForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const formData = new FormData();
        formData.append('_subject', 'New Shop Application - Crimson Owl');
        formData.append('Shop Name', document.getElementById('shopName').value);
        formData.append('Owner Name', document.getElementById('ownerName').value);
        formData.append('Email', document.getElementById('email').value);
        formData.append('Phone', document.getElementById('phone').value);
        formData.append('Category', document.getElementById('category').value);
        formData.append('Description', document.getElementById('description').value);
        
        try {
            const response = await fetch(`https://formspree.io/f/${FORMSPREE_ID}`, {
                method: 'POST',
                body: formData,
                headers: { 'Accept': 'application/json' }
            });
            
            if (response.ok) {
                document.getElementById('formMessage').innerHTML = '<div class="message success">✅ Application sent! We\'ll contact you within 24 hours.</div>';
                document.getElementById('applyForm').reset();
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 3000);
            } else {
                throw new Error();
            }
        } catch (error) {
            document.getElementById('formMessage').innerHTML = '<div class="message error">❌ Failed to send. Please try again.</div>';
        }
    });
</script>

</body>
</html>
