<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Open a Shop - Ignivolatus Store</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-image: url('images/background.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            position: relative;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: -1;
        }

        .navbar {
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 20px;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-btn {
            color: white;
            text-decoration: none;
            font-size: 16px;
        }

        .logo {
            font-size: 18px;
            font-weight: 600;
            color: white;
        }

        .container {
            max-width: 550px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .form-card {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 32px;
        }

        .form-card h1 {
            color: white;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .form-card > p {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #ccc;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: white;
        }

        .info-box {
            background: #1a1a1a;
            padding: 16px;
            border-radius: 12px;
            margin: 24px 0;
            border: 1px solid #333;
        }

        .info-box p {
            color: #ccc;
            font-size: 13px;
            margin: 6px 0;
        }

        .info-box strong {
            color: white;
        }

        .btn-submit {
            width: 100%;
            background: white;
            color: black;
            padding: 14px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
        }

        .btn-submit:hover {
            opacity: 0.9;
        }

        .alert-success {
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid rgba(0, 255, 0, 0.3);
            color: #00ff00;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
        }

        .footer {
            background: rgba(0, 0, 0, 0.95);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px;
            text-align: center;
            margin-top: 40px;
        }

        .footer p {
            color: #555;
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px 16px;
            }
            
            .form-card {
                padding: 24px;
            }
            
            .form-card h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="nav-container">
        <a href="index.html" class="back-btn">←</a>
        <div class="logo">Open a Shop</div>
    </div>
</div>

<div class="container">
    <div class="form-card">
        <h1>Start Your Digital Shop</h1>
        <p>Fill the form. We'll contact you within 24 hours.</p>
        
        <div id="successMessage" style="display: none;" class="alert-success">
            ✅ Application sent! Check your email.
        </div>
        
        <form id="applyForm">
            <div class="form-group">
                <label>Shop Name</label>
                <input type="text" id="shopName" required placeholder="e.g., Buna Coffee">
            </div>
            
            <div class="form-group">
                <label>Your Name</label>
                <input type="text" id="ownerName" required>
            </div>
            
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>
            
            <div class="form-group">
                <label>Phone</label>
                <input type="tel" id="phone" required>
            </div>
            
            <div class="form-group">
                <label>Category</label>
                <select id="category">
                    <option>Fashion & Clothing</option>
                    <option>Food & Restaurant</option>
                    <option>Electronics</option>
                    <option>Handicrafts & Art</option>
                    <option>Home & Living</option>
                    <option>Beauty & Health</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Description</label>
                <textarea id="description" rows="4" required placeholder="What do you sell?"></textarea>
            </div>
            
            <div class="info-box">
                <p><strong>💰 Total: 1,500 ETB</strong></p>
                <p>Setup Fee: 1,000 ETB (one-time)</p>
                <p>Monthly Rent: 500 ETB</p>
            </div>
            
            <button type="submit" class="btn-submit">Submit Application</button>
        </form>
    </div>
</div>

<div class="footer">
    <p>© 2024 Ignivolatus Store</p>
</div>

<script>
    const ADMIN_EMAIL = "ignivolatusapk@gmail.com";
    
    function sendEmail(to, subject, body) {
        window.location.href = `mailto:${to}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    }
    
    document.getElementById('applyForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const data = {
            shopName: document.getElementById('shopName').value,
            ownerName: document.getElementById('ownerName').value,
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value,
            category: document.getElementById('category').value,
            description: document.getElementById('description').value
        };
        
        const subject = `New Shop: ${data.shopName}`;
        const body = `New application!\n\nShop: ${data.shopName}\nOwner: ${data.ownerName}\nEmail: ${data.email}\nPhone: ${data.phone}\nCategory: ${data.category}\n\nDescription:\n${data.description}`;
        
        sendEmail(ADMIN_EMAIL, subject, body);
        
        document.getElementById('successMessage').style.display = 'block';
        document.getElementById('applyForm').reset();
        
        setTimeout(() => {
            window.location.href = 'index.html';
        }, 2000);
    });
</script>

</body>
</html>
