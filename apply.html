<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open a Shop - Ignivolatus Store</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
        }

        .navbar {
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 16px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-logo img {
            height: 36px;
            width: auto;
        }

        .nav-logo span {
            color: white;
            font-weight: 700;
            font-size: 18px;
        }

        .back-btn {
            color: white;
            text-decoration: none;
            font-size: 14px;
        }

        .container {
            max-width: 550px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        .form-card {
            background: #1a1a1a;
            border-radius: 24px;
            padding: 40px;
            border: 1px solid #333;
        }

        .form-card h1 {
            color: white;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .form-card p {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #ccc;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 14px;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #666;
        }

        .info-box {
            background: #0a0a0a;
            padding: 16px;
            border-radius: 12px;
            margin: 24px 0;
            border: 1px solid #333;
        }

        .info-box p {
            color: #ccc;
            font-size: 13px;
            margin: 6px 0;
        }

        .info-box strong {
            color: white;
        }

        .btn-submit {
            width: 100%;
            background: white;
            color: black;
            padding: 14px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
        }

        .btn-submit:hover {
            opacity: 0.9;
        }

        .alert-success {
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid #00ff00;
            color: #00ff00;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
        }

        .footer {
            background: rgba(0, 0, 0, 0.95);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 24px;
            text-align: center;
        }

        .footer p {
            color: #666;
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px 16px;
            }
            
            .form-card {
                padding: 24px;
            }
            
            .form-card h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="nav-container">
        <div class="nav-logo">
            <img src="images/your-logo.png" alt="Ignivolatus Logo">
            <span>IGNIVOLATUS</span>
        </div>
        <a href="index.html" class="back-btn">← Back to Home</a>
    </div>
</div>

<div class="container">
    <div class="form-card">
        <h1>Start Your Digital Shop</h1>
        <p>Fill the form. We'll contact you within 24 hours.</p>
        
        <div id="successMessage" style="display: none;" class="alert-success">
            ✅ Application sent! We'll contact you soon.
        </div>
        
        <form id="applyForm" action="https://formsubmit.co/ignivolatusapk@gmail.com" method="POST">
            <!-- FormSubmit configuration -->
            <input type="hidden" name="_subject" value="New Shop Application - Ignivolatus">
            <input type="hidden" name="_template" value="table">
            <input type="hidden" name="_captcha" value="false">
            <input type="hidden" name="_next" value="https://YOUR_USERNAME.github.io/ignivolatus-store/thankyou.html">
            
            <div class="form-group">
                <label>Shop Name</label>
                <input type="text" name="Shop Name" id="shopName" required placeholder="e.g., Buna Coffee">
            </div>
            
            <div class="form-group">
                <label>Your Name</label>
                <input type="text" name="Owner Name" id="ownerName" required>
            </div>
            
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="Email" id="email" required>
            </div>
            
            <div class="form-group">
                <label>Phone</label>
                <input type="tel" name="Phone" id="phone" required>
            </div>
            
            <div class="form-group">
                <label>Category</label>
                <select name="Category" id="category">
                    <option>Fashion & Clothing</option>
                    <option>Food & Restaurant</option>
                    <option>Electronics</option>
                    <option>Handicrafts & Art</option>
                    <option>Home & Living</option>
                    <option>Beauty & Health</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Description</label>
                <textarea name="Description" id="description" rows="4" required placeholder="What do you sell? Describe your products..."></textarea>
            </div>
            
            <div class="info-box">
                <p><strong>💰 Total: 1,500 ETB</strong></p>
                <p>Setup Fee: 1,000 ETB (one-time)</p>
                <p>Monthly Rent: 500 ETB</p>
            </div>
            
            <button type="submit" class="btn-submit">Submit Application</button>
        </form>
    </div>
</div>

<div class="footer">
    <p>© 2024 Ignivolatus Store | Digital Shops Directory</p>
</div>

<script>
    document.getElementById('applyForm').addEventListener('submit', function(e) {
        // Show success message
        document.getElementById('successMessage').style.display = 'block';
        
        // Form will submit normally to FormSubmit
        setTimeout(() => {
            document.getElementById('successMessage').style.display = 'none';
        }, 3000);
    });
</script>

</body>
</html>
