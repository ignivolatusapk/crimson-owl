<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>List Your Business - Crimson Owl</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --crimson: #8B0000;
            --crimson-light: #a52a2a;
            --text-dark: #1a1a1a;
            --text-medium: #4a4a4a;
            --text-light: #6c757d;
            --bg-white: #ffffff;
            --bg-off-white: #f8f9fa;
            --border-light: #e9ecef;
            --shadow-sm: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.05);
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-off-white);
            color: var(--text-dark);
            line-height: 1.6;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 0.75rem 1.5rem;
            border-bottom: 1px solid var(--border-light);
        }

        .nav-container {
            max-width: 1280px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-logo img {
            height: 36px;
            width: auto;
        }

        .nav-logo span {
            color: var(--text-dark);
            font-weight: 700;
            font-size: 1.2rem;
        }

        .back-btn {
            color: var(--text-dark);
            text-decoration: none;
            background: var(--bg-white);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-size: 0.85rem;
            border: 1px solid var(--border-light);
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        .form-card {
            background: var(--bg-white);
            border-radius: 1.5rem;
            padding: 2rem;
            border: 1px solid var(--border-light);
        }

        .form-card h1 {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
        }

        .form-card > p {
            color: var(--text-light);
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            background: var(--bg-off-white);
            border: 1px solid var(--border-light);
            border-radius: 0.75rem;
            font-family: inherit;
            font-size: 0.9rem;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--crimson);
        }

        .info-box {
            background: var(--bg-off-white);
            padding: 1rem;
            border-radius: 0.75rem;
            margin: 1.5rem 0;
            text-align: center;
        }

        .info-box p {
            margin: 0.25rem 0;
        }

        .btn-submit {
            width: 100%;
            background: var(--crimson);
            color: white;
            padding: 0.85rem;
            border: none;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
        }

        .btn-submit:hover {
            background: var(--crimson-light);
        }

        .message {
            padding: 0.75rem;
            border-radius: 0.75rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .message.success {
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid #00ff00;
            color: #00ff00;
        }

        .footer {
            background: var(--bg-white);
            padding: 2rem 1rem;
            text-align: center;
            border-top: 1px solid var(--border-light);
            margin-top: 2rem;
        }

        .footer p {
            color: var(--text-light);
            font-size: 0.8rem;
        }

        @media (max-width: 768px) {
            .form-card {
                padding: 1.5rem;
            }
            .form-card h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="nav-container">
        <div class="nav-logo">
            <img src="images/logo.png" alt="Crimson Owl Logo">
            <span>CRIMSON OWL</span>
        </div>
        <a href="index.html" class="back-btn">← Back to Home</a>
    </div>
</div>

<div class="container">
    <div class="form-card">
        <h1>📝 List Your Business</h1>
        <p>Fill the form below. We'll contact you within 24 hours.</p>

        <div id="formMessage"></div>

        <form id="applyForm">
            <div class="form-group">
                <label>Business Name *</label>
                <input type="text" id="businessName" required placeholder="e.g., Tomoca Coffee">
            </div>

            <div class="form-group">
                <label>Your Name *</label>
                <input type="text" id="ownerName" required>
            </div>

            <div class="form-group">
                <label>Email *</label>
                <input type="email" id="email" required>
            </div>

            <div class="form-group">
                <label>Phone *</label>
                <input type="tel" id="phone" required>
            </div>

            <div class="form-group">
                <label>Business Category *</label>
                <select id="category">
                    <option>🏨 Hotel & Resort</option>
                    <option>☕ Cafe & Coffee Shop</option>
                    <option>🍽️ Restaurant & Dining</option>
                    <option>✈️ Airline Company</option>
                    <option>🚗 Travel Agency</option>
                    <option>🏛️ Government Office</option>
                    <option>💼 Corporate Company</option>
                    <option>🏦 Bank & Financial</option>
                    <option>📞 Telecom & Internet</option>
                    <option>🏥 Private Hospital & Clinic</option>
                    <option>🏫 University & College</option>
                    <option>🛒 Supermarket & Grocery</option>
                    <option>👗 Fashion & Clothing</option>
                    <option>🏋️ Gym & Fitness Center</option>
                    <option>💇 Salon & Barber</option>
                    <option>📸 Photography Studio</option>
                </select>
            </div>

            <div class="form-group">
                <label>Business Description *</label>
                <textarea id="description" rows="4" required placeholder="Describe what your business does..."></textarea>
            </div>

            <div class="info-box">
                <p><strong>💰 Total: 1,500 ETB</strong></p>
                <p>Setup Fee: 1,000 ETB (one-time)</p>
                <p>Monthly Rent: 500 ETB</p>
            </div>

            <button type="submit" class="btn-submit">Submit Application</button>
        </form>
    </div>
</div>

<div class="footer">
    <p>© 2026 Crimson Owl | Ethiopian Business Directory</p>
</div>

<script>
    const FORMSPREE_ID = 'mlgzlbak';

    document.getElementById('applyForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const formData = new FormData();
        formData.append('_subject', 'New Business Application - Crimson Owl');
        formData.append('Business Name', document.getElementById('businessName').value);
        formData.append('Owner Name', document.getElementById('ownerName').value);
        formData.append('Email', document.getElementById('email').value);
        formData.append('Phone', document.getElementById('phone').value);
        formData.append('Category', document.getElementById('category').value);
        formData.append('Description', document.getElementById('description').value);

        try {
            const response = await fetch(`https://formspree.io/f/${FORMSPREE_ID}`, {
                method: 'POST',
                body: formData,
                headers: { 'Accept': 'application/json' }
            });

            if (response.ok) {
                document.getElementById('formMessage').innerHTML = '<div class="message success">✅ Application sent! We\'ll contact you within 24 hours.</div>';
                document.getElementById('applyForm').reset();
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 3000);
            } else {
                throw new Error();
            }
        } catch (error) {
            document.getElementById('formMessage').innerHTML = '<div class="message error">❌ Failed to send. Please try again.</div>';
        }
    });
</script>

</body>
</html>
