<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - Crimson Owl Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #0a0a0a; }
        .navbar { background: rgba(0,0,0,0.95); padding: 16px 24px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .nav-logo { display: flex; align-items: center; gap: 10px; }
        .nav-logo img { height: 36px; }
        .nav-logo span { color: white; font-weight: 700; font-size: 18px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 24px; }
        .stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: #1a1a1a; border-radius: 20px; padding: 24px; text-align: center; }
        .stat-number { font-size: 36px; font-weight: 800; color: #8B0000; }
        .stat-label { color: #aaa; font-size: 13px; margin-top: 8px; }
        .card { background: #1a1a1a; border-radius: 20px; padding: 24px; margin-bottom: 24px; }
        .card h3 { color: white; margin-bottom: 20px; font-size: 18px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px; color: #aaa; border-bottom: 1px solid #333; }
        th { color: white; }
        .rank-1 { color: #FFD700; font-weight: bold; }
        .rank-2 { color: #C0C0C0; font-weight: bold; }
        .rank-3 { color: #CD7F32; font-weight: bold; }
        .footer { background: rgba(0,0,0,0.95); border-top: 1px solid rgba(255,255,255,0.05); padding: 24px; text-align: center; margin-top: 40px; }
        @media (max-width: 768px) { .stats-grid { grid-template-columns: repeat(2,1fr); } }
    </style>
</head>
<body>

<div class="navbar">
    <div class="nav-container">
        <div class="nav-logo"><img src="images/logo.png" alt="Logo"><span>CRIMSON OWL</span></div>
    </div>
</div>

<div class="container">
    <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><div class="stat-number" id="totalViews">--</div><div class="stat-label">Total Page Views</div></div>
        <div class="stat-card"><div class="stat-number" id="totalBusinesses">--</div><div class="stat-label">Total Businesses</div></div>
        <div class="stat-card"><div class="stat-number" id="featuredCount">--</div><div class="stat-label">Featured Businesses</div></div>
        <div class="stat-card"><div class="stat-number" id="totalReviews">--</div><div class="stat-label">Total Reviews</div></div>
    </div>

    <div class="card"><h3>📊 Today's Views</h3><div id="todayViews">--</div></div>
    <div class="card"><h3>🏆 Most Viewed Businesses (This Week)</h3><div id="topViewed"></div></div>
    <div class="card"><h3>📈 Weekly Visitors</h3><div id="weeklyStats"></div></div>
</div>

<div class="footer"><p>© 2026 Crimson Owl | Analytics Dashboard</p></div>

<script>
    const GITHUB_SHOPS_URL = 'https://raw.githubusercontent.com/ignivolatusapk/crimson-owl/main/shops.json';

    function loadAnalytics() {
        // Get view counts from localStorage
        const views = JSON.parse(localStorage.getItem('crimsonowl_views') || '{}');
        const totalViews = Object.values(views).reduce((a,b) => a + b, 0);
        document.getElementById('totalViews').innerText = totalViews || 0;

        // Today's views
        const today = new Date().toDateString();
        const todayViews = views[today] || 0;
        document.getElementById('todayViews').innerHTML = `<span style="font-size:28px; color:#8B0000;">${todayViews}</span> views today`;

        // Weekly stats
        const weekDays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        let weeklyHtml = '<div style="display:flex; gap:20px; flex-wrap:wrap;">';
        for(let i=0; i<7; i++) {
            const date = new Date();
            date.setDate(date.getDate() - i);
            const dayKey = date.toDateString();
            const dayViews = views[dayKey] || 0;
            weeklyHtml += `<div style="text-align:center;"><div style="font-size:20px; font-weight:bold; color:#8B0000;">${dayViews}</div><div style="color:#888;">${weekDays[date.getDay()]}</div></div>`;
        }
        weeklyHtml += '</div>';
        document.getElementById('weeklyStats').innerHTML = weeklyHtml;

        // Load businesses and rank by views
        fetch(GITHUB_SHOPS_URL)
            .then(res => res.json())
            .then(data => {
                const businesses = data.shops.filter(s => s.status === 'active');
                document.getElementById('totalBusinesses').innerText = businesses.length;
                document.getElementById('featuredCount').innerText = businesses.filter(b => b.featured).length;

                // Count reviews
                let totalReviews = 0;
                businesses.forEach(b => {
                    const reviews = JSON.parse(localStorage.getItem(`reviews_${b.id}`) || '[]');
                    totalReviews += reviews.length;
                });
                document.getElementById('totalReviews').innerText = totalReviews;

                // Get business views
                const businessViews = {};
                businesses.forEach(b => { businessViews[b.id] = JSON.parse(localStorage.getItem(`views_${b.id}`) || '0'); });
                const sorted = businesses.sort((a,b) => (businessViews[b.id] || 0) - (businessViews[a.id] || 0)).slice(0,10);
                const html = `<table><tr><th>Rank</th><th>Business</th><th>Views</th></tr>${
                    sorted.map((b,i) => `<tr><td class="rank-${i+1}">${i+1}</td><td>${b.shopName}</td><td>${businessViews[b.id] || 0}</td></tr>`).join('')
                }</table>`;
                document.getElementById('topViewed').innerHTML = html;
            });
    }

    loadAnalytics();
</script>

</body>
</html>
