<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - Crimson Owl</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --crimson: #8B0000;
    --crimson-light: #A52A2A;
    --pure-white: #FFFFFF;
    --mid-gray: #AAAAAA;
    --charcoal: #1A1A1A;
    --black: #000000;
  }

  body {
    font-family: 'Space Mono', monospace;
    background: var(--black);
    color: var(--pure-white);
    cursor: none;
  }

  .cursor {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--crimson);
    position: fixed; pointer-events: none; z-index: 9999;
    transform: translate(-50%, -50%);
  }

  .container { max-width: 1200px; margin: 0 auto; padding: 100px 24px 60px; }

  .login-box, .admin-box {
    background: var(--charcoal);
    border-radius: 24px;
    padding: 48px;
    border: 1px solid rgba(139,0,0,0.3);
  }
  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 8px; }
  p { color: var(--mid-gray); margin-bottom: 32px; }

  input, select, textarea {
    width: 100%; padding: 14px;
    background: var(--black);
    border: 1px solid rgba(139,0,0,0.3);
    border-radius: 12px;
    color: var(--pure-white);
    margin-bottom: 16px;
  }
  button {
    background: var(--crimson);
    color: white;
    padding: 14px 28px;
    border: none;
    border-radius: 40px;
    cursor: pointer;
    width: 100%;
  }
  button:hover { background: var(--crimson-light); }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4,1fr);
    gap: 20px;
    margin-bottom: 40px;
  }
  .stat-card {
    background: var(--charcoal);
    padding: 24px;
    border-radius: 16px;
    text-align: center;
  }
  .stat-number { font-size: 2rem; font-weight: 800; color: var(--crimson); }
  .stat-label { font-size: 0.7rem; color: var(--mid-gray); }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .json-output {
    background: var(--black);
    padding: 16px;
    border-radius: 12px;
    font-family: monospace;
    font-size: 12px;
    margin: 16px 0;
  }

  @media (max-width: 768px) {
    .stats-grid { grid-template-columns: repeat(2,1fr); }
    .form-row { grid-template-columns: 1fr; }
    .container { padding: 80px 16px 40px; }
    .login-box, .admin-box { padding: 28px; }
  }
</style>
</head>
<body>
<div class="cursor" id="cursor"></div>

<div class="container" id="app">
  <div id="loginSection" class="login-box">
    <h1>🔐 Admin Access</h1>
    <p>Enter your email to receive a verification code</p>
    <div id="loginMessage"></div>
    <input type="email" id="adminEmail" placeholder="Email" value="ignivolatusapk@gmail.com">
    <button onclick="sendCode()">Send Verification Code</button>
  </div>

  <div id="verifySection" style="display:none" class="login-box">
    <h1>📧 Verification Code</h1>
    <div id="verifyMessage"></div>
    <input type="text" id="verificationCode" placeholder="000000" style="text-align:center;font-size:1.5rem;letter-spacing:4px">
    <button onclick="verify()">Verify & Login</button>
    <button onclick="backToLogin()" style="background:#333;margin-top:12px">Back</button>
  </div>

  <div id="adminSection" style="display:none">
    <div class="admin-box">
      <h1>📊 Analytics Dashboard</h1>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-number" id="totalViews">--</div><div class="stat-label">Total Views</div></div>
        <div class="stat-card"><div class="stat-number" id="todayViews">--</div><div class="stat-label">Today's Views</div></div>
        <div class="stat-card"><div class="stat-number" id="totalBusinesses">--</div><div class="stat-label">Total Businesses</div></div>
        <div class="stat-card"><div class="stat-number" id="featuredCount">--</div><div class="stat-label">Featured</div></div>
      </div>

      <h1>➕ Add Business</h1>
      <div id="adminMessage"></div>
      <div class="form-row">
        <input type="text" id="shopName" placeholder="Business Name">
        <select id="category">
          <option>🏨 Hotel & Resort</option><option>☕ Cafe & Coffee Shop</option>
          <option>🍽️ Restaurant</option><option>👗 Fashion</option>
          <option>🏦 Bank</option><option>🏥 Hospital</option>
        </select>
      </div>
      <input type="text" id="shopUrl" placeholder="Website URL">
      <div class="form-row">
        <input type="text" id="phone" placeholder="Phone">
        <input type="email" id="email" placeholder="Email">
      </div>
      <input type="text" id="address" placeholder="Address">
      <input type="text" id="storePhoto" placeholder="Store Photo URL">
      <textarea id="description" rows="2" placeholder="Short Description"></textarea>
      <label style="display:flex;align-items:center;gap:8px;margin:16px 0">
        <input type="checkbox" id="featuredCheckbox"> ⭐ Featured Business
      </label>
      <button onclick="generateJSON()">🔧 Generate JSON</button>
      <div id="jsonOutput" style="display:none"><div class="json-output" id="jsonCode"></div><button onclick="copyJSON()">📋 Copy</button></div>
      <button onclick="logout()" style="background:#333;margin-top:24px">Logout</button>
    </div>
  </div>
</div>

<script>
  const FORMSPREE_ID = 'mlgzlbak';
  let storedCode = null;

  const cursor = document.getElementById('cursor');
  let mx=0,my=0;
  document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
  function animate(){cursor.style.left=mx+'px';cursor.style.top=my+'px';requestAnimationFrame(animate);}
  animate();

  async function sendCode(){
    const email = document.getElementById('adminEmail').value;
    if(email !== 'ignivolatusapk@gmail.com'){ document.getElementById('loginMessage').innerHTML='<div style="color:#ff4444">❌ Unauthorized</div>'; return; }
    const code = Math.floor(100000+Math.random()*900000).toString();
    storedCode = code;
    const fd = new FormData();
    fd.append('_subject','Crimson Owl Admin Code');
    fd.append('message',`Your code: ${code}`);
    await fetch(`https://formspree.io/f/${FORMSPREE_ID}`,{method:'POST',body:fd});
    document.getElementById('loginMessage').innerHTML=`<div style="color:#00ff00">✅ Code sent! Use: ${code}</div>`;
    setTimeout(()=>{
      document.getElementById('loginSection').style.display='none';
      document.getElementById('verifySection').style.display='block';
    },1000);
  }
  function verify(){
    if(document.getElementById('verificationCode').value === storedCode){
      document.getElementById('verifySection').style.display='none';
      document.getElementById('adminSection').style.display='block';
      loadAnalytics();
    } else { document.getElementById('verifyMessage').innerHTML='<div style="color:#ff4444">❌ Invalid code</div>'; }
  }
  function backToLogin(){
    document.getElementById('verifySection').style.display='none';
    document.getElementById('loginSection').style.display='block';
  }
  function logout(){
    document.getElementById('adminSection').style.display='none';
    document.getElementById('loginSection').style.display='block';
  }

  async function loadAnalytics(){
    const views = JSON.parse(localStorage.getItem('crimsonowl_views')||'{}');
    document.getElementById('totalViews').innerText = Object.values(views).reduce((a,b)=>a+b,0);
    document.getElementById('todayViews').innerText = views[new Date().toDateString()]||0;
    const res = await fetch('https://raw.githubusercontent.com/ignivolatusapk/crimson-owl/main/shops.json');
    const data = await res.json();
    const active = data.shops.filter(s=>s.status==='active');
    document.getElementById('totalBusinesses').innerText = active.length;
    document.getElementById('featuredCount').innerText = active.filter(s=>s.featured).length;
  }

  function generateJSON(){
    const newShop = {
      id: Date.now(),
      shopName: document.getElementById('shopName').value,
      category: document.getElementById('category').value,
      description: document.getElementById('description').value,
      fullDescription: document.getElementById('description').value,
      shopUrl: document.getElementById('shopUrl').value,
      phone: document.getElementById('phone').value,
      email: document.getElementById('email').value,
      address: document.getElementById('address').value,
      storePhoto: document.getElementById('storePhoto').value,
      featured: document.getElementById('featuredCheckbox').checked,
      rating: 0, reviews: 0, status: "active", addedDate: new Date().toISOString().split('T')[0]
    };
    document.getElementById('jsonCode').innerText = JSON.stringify(newShop,null,2);
    document.getElementById('jsonOutput').style.display='block';
  }
  function copyJSON(){
    navigator.clipboard.writeText(document.getElementById('jsonCode').innerText);
    alert('Copied!');
  }
</script>
</body>
</html>
