<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Ignivolatus Store</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .login-box, .admin-box {
            background: #1a1a1a;
            border-radius: 24px;
            padding: 40px;
            border: 1px solid #333;
        }

        .login-box h1, .admin-box h1 {
            color: white;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .login-box p, .admin-box p {
            color: #aaa;
            margin-bottom: 24px;
        }

        input, textarea, select {
            width: 100%;
            padding: 14px;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            margin-bottom: 16px;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #666;
        }

        button {
            background: white;
            color: black;
            padding: 14px 28px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

        .shop-item {
            background: #0a0a0a;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .shop-info h4 {
            color: white;
            margin-bottom: 4px;
        }

        .shop-info p {
            color: #888;
            font-size: 12px;
            margin: 0;
        }

        .delete-btn {
            background: #ff4444;
            color: white;
            padding: 8px 16px;
            font-size: 12px;
        }

        .success {
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid #00ff00;
            color: #00ff00;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .error {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid #ff4444;
            color: #ff4444;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        h3 {
            color: white;
            margin: 24px 0 16px;
            font-size: 18px;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
                gap: 0;
            }
            
            .login-box, .admin-box {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="loginSection">
            <div class="login-box">
                <h1>🔐 Admin Access</h1>
                <p>Enter your password to manage shops</p>
                <input type="password" id="adminPassword" placeholder="Password">
                <button onclick="login()">Login</button>
            </div>
        </div>

        <div id="adminSection" style="display: none;">
            <div class="admin-box">
                <h1>➕ Add New Shop</h1>
                <p>Add a shop to the directory</p>
                
                <div id="message"></div>
                
                <div class="form-row">
                    <input type="text" id="shopName" placeholder="Shop Name *">
                    <select id="category">
                        <option>Fashion & Clothing</option>
                        <option>Food & Restaurant</option>
                        <option>Electronics</option>
                        <option>Handicrafts & Art</option>
                        <option>Home & Living</option>
                        <option>Beauty & Health</option>
                    </select>
                </div>
                
                <input type="text" id="shopUrl" placeholder="Shop URL * (e.g., https://shopname.com)">
                <input type="text" id="shopLogo" placeholder="Shop Logo (emoji or image URL) - leave blank for 🏪">
                <textarea id="description" rows="3" placeholder="Shop Description *"></textarea>
                
                <button onclick="addShop()" style="width: 100%; margin-top: 8px;">➕ Add Shop to Directory</button>
                
                <h3>📋 Current Shops</h3>
                <div id="shopsList"></div>
                
                <button onclick="logout()" style="background: #333; color: white; width: 100%; margin-top: 16px;">Logout</button>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = "admin123";
        const GITHUB_RAW_URL = 'https://raw.githubusercontent.com/YOUR_USERNAME/ignivolatus-store/main/shops.json';
        const GITHUB_API_URL = 'https://api.github.com/repos/YOUR_USERNAME/ignivolatus-store/contents/shops.json';
        const GITHUB_TOKEN = ''; // You'll add your token
        
        let shops = [];

        async function loadShops() {
            try {
                const response = await fetch(GITHUB_RAW_URL + '?t=' + Date.now());
                if (response.ok) {
                    const data = await response.json();
                    shops = data.shops;
                } else {
                    shops = [];
                }
            } catch(e) {
                shops = [];
            }
            displayShopsList();
        }

        function displayShopsList() {
            const container = document.getElementById('shopsList');
            if (shops.length === 0) {
                container.innerHTML = '<p style="color: #888;">No shops yet.</p>';
                return;
            }
            
            container.innerHTML = shops.map(shop => `
                <div class="shop-item">
                    <div class="shop-info">
                        <h4>${shop.shopName}</h4>
                        <p>${shop.shopUrl}</p>
                    </div>
                    <button class="delete-btn" onclick="deleteShop(${shop.id})">Delete</button>
                </div>
            `).join('');
        }

        async function addShop() {
            const shopName = document.getElementById('shopName').value;
            const category = document.getElementById('category').value;
            const shopUrl = document.getElementById('shopUrl').value;
            const description = document.getElementById('description').value;
            const logo = document.getElementById('shopLogo').value || '🏪';
            
            if (!shopName || !shopUrl || !description) {
                document.getElementById('message').innerHTML = '<div class="error">Please fill all required fields</div>';
                setTimeout(() => document.getElementById('message').innerHTML = '', 3000);
                return;
            }
            
            const newShop = {
                id: Date.now(),
                shopName: shopName,
                category: category,
                description: description,
                shopUrl: shopUrl,
                logo: logo,
                status: "active",
                addedDate: new Date().toISOString().split('T')[0]
            };
            
            shops.push(newShop);
            
            // Save to localStorage as backup
            localStorage.setItem('ignivolatus_shops_backup', JSON.stringify(shops));
            
            // Show instructions for manual GitHub update
            document.getElementById('message').innerHTML = `
                <div class="success">
                    ✅ Shop ready!<br><br>
                    <strong>To make it live:</strong><br>
                    1. Go to GitHub → shops.json<br>
                    2. Copy this shop and paste into the array:<br><br>
                    <code style="background: #000; padding: 8px; display: block; font-size: 12px; word-break: break-all;">
${JSON.stringify(newShop, null, 2)}
                    </code>
                </div>
            `;
            
            // Clear form
            document.getElementById('shopName').value = '';
            document.getElementById('shopUrl').value = '';
            document.getElementById('description').value = '';
            document.getElementById('shopLogo').value = '';
            
            displayShopsList();
            
            // Also send email notification
            sendEmailNotification(newShop);
        }
        
        function sendEmailNotification(shop) {
            // Using FormSubmit to send email without opening mail client
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = 'https://formsubmit.co/ignivolatusapk@gmail.com';
            form.style.display = 'none';
            
            const data = {
                _subject: `New Shop Added: ${shop.shopName}`,
                _template: 'table',
                'Shop Name': shop.shopName,
                'Category': shop.category,
                'URL': shop.shopUrl,
                'Description': shop.description,
                'Added Date': shop.addedDate
            };
            
            Object.keys(data).forEach(key => {
                const input = document.createElement('input');
                input.name = key;
                input.value = data[key];
                form.appendChild(input);
            });
            
            document.body.appendChild(form);
            form.submit();
            setTimeout(() => form.remove(), 1000);
        }

        function deleteShop(id) {
            if (confirm('Delete this shop?')) {
                shops = shops.filter(s => s.id !== id);
                displayShopsList();
                document.getElementById('message').innerHTML = `
                    <div class="success">✅ Shop removed. Update shops.json on GitHub to make permanent.</div>
                `;
                setTimeout(() => document.getElementById('message').innerHTML = '', 3000);
            }
        }

        function login() {
            const password = document.getElementById('adminPassword').value;
            if (password === ADMIN_PASSWORD) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('adminSection').style.display = 'block';
                loadShops();
            } else {
                alert('Wrong password!');
            }
        }

        function logout() {
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('adminSection').style.display = 'none';
            document.getElementById('adminPassword').value = '';
        }
    </script>
</body>
</html>
