<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Business Details - Crimson Owl</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --crimson: #8B0000;
            --crimson-light: #a52a2a;
            --text-dark: #1a1a1a;
            --text-medium: #4a4a4a;
            --text-light: #6c757d;
            --bg-white: #ffffff;
            --bg-off-white: #f8f9fa;
            --border-light: #e9ecef;
            --shadow-sm: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.05);
            --shadow-md: 0 0.5rem 1rem rgba(0, 0, 0, 0.05);
            --shadow-hover: 0 1rem 1.5rem rgba(0, 0, 0, 0.1);
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-off-white);
            color: var(--text-dark);
            line-height: 1.6;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 0.75rem 1.5rem;
            border-bottom: 1px solid var(--border-light);
        }

        .nav-container {
            max-width: 1280px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-logo img {
            height: 36px;
            width: auto;
        }

        .nav-logo span {
            color: var(--text-dark);
            font-weight: 700;
            font-size: 1.2rem;
        }

        .back-btn {
            color: var(--text-dark);
            text-decoration: none;
            background: var(--bg-white);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-size: 0.85rem;
            border: 1px solid var(--border-light);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-light);
        }

        .business-header {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 2rem;
            background: var(--bg-white);
            border-radius: 1.5rem;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border-light);
        }

        .business-logo-large {
            width: 120px;
            height: 120px;
            border-radius: 1rem;
            object-fit: cover;
        }

        .business-title h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .business-category {
            display: inline-block;
            background: rgba(139, 0, 0, 0.1);
            color: var(--crimson);
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            margin-right: 0.5rem;
        }

        .featured-badge {
            display: inline-block;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #000;
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .business-rating {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .stars {
            display: flex;
            gap: 0.25rem;
        }

        .stars svg {
            width: 18px;
            height: 18px;
            fill: #FFD700;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .info-card {
            background: var(--bg-white);
            border-radius: 1rem;
            padding: 1.5rem;
            border: 1px solid var(--border-light);
        }

        .info-card h3 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border-light);
        }

        .contact-icon {
            width: 36px;
            height: 36px;
            background: rgba(139, 0, 0, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .contact-label {
            font-size: 0.7rem;
            color: var(--text-light);
        }

        .contact-value {
            color: var(--text-dark);
            font-size: 0.85rem;
            text-decoration: none;
        }

        .hours-list {
            list-style: none;
        }

        .hours-list li {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border-light);
            font-size: 0.85rem;
        }

        .hours-list li span:first-child {
            color: var(--text-medium);
        }

        .photo-gallery {
            margin-bottom: 2rem;
        }

        .photo-gallery h3 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1rem;
        }

        .gallery-item {
            aspect-ratio: 1;
            border-radius: 1rem;
            overflow: hidden;
            cursor: pointer;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .description-section {
            background: var(--bg-white);
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border-light);
        }

        .description-section h3 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
        }

        .description-section p {
            color: var(--text-medium);
            line-height: 1.6;
        }

        .reviews-section {
            background: var(--bg-white);
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border-light);
        }

        .reviews-section h3 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
        }

        .review-item {
            background: var(--bg-off-white);
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }

        .reviewer-name {
            font-weight: 600;
        }

        .review-date {
            font-size: 0.7rem;
            color: var(--text-light);
        }

        .review-stars {
            display: flex;
            gap: 0.2rem;
            margin-bottom: 0.5rem;
        }

        .review-stars svg {
            width: 14px;
            height: 14px;
            fill: #FFD700;
        }

        .review-text {
            font-size: 0.85rem;
            color: var(--text-medium);
        }

        .write-review {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-light);
        }

        .write-review input, .write-review select, .write-review textarea {
            width: 100%;
            padding: 0.75rem;
            background: var(--bg-off-white);
            border: 1px solid var(--border-light);
            border-radius: 0.75rem;
            margin-bottom: 1rem;
            font-family: inherit;
        }

        .submit-review {
            background: var(--crimson);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 2rem;
            cursor: pointer;
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .action-btn {
            flex: 1;
            padding: 0.75rem;
            border-radius: 2rem;
            text-align: center;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .action-btn.website {
            background: var(--crimson);
            color: white;
        }

        .action-btn.call {
            background: transparent;
            border: 1px solid var(--crimson);
            color: var(--crimson);
        }

        .action-btn.direction {
            background: transparent;
            border: 1px solid var(--border-light);
            color: var(--text-dark);
        }

        .footer {
            background: var(--bg-white);
            padding: 2rem 1rem;
            text-align: center;
            border-top: 1px solid var(--border-light);
            margin-top: 2rem;
        }

        .footer p {
            color: var(--text-light);
            font-size: 0.8rem;
        }

        @media (max-width: 768px) {
            .business-header {
                grid-template-columns: 1fr;
                text-align: center;
            }
            .business-logo-large {
                margin: 0 auto;
            }
            .business-rating {
                justify-content: center;
            }
            .action-buttons {
                flex-direction: column;
            }
            .container {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="nav-container">
        <div class="nav-logo">
            <img src="images/logo.png" alt="Crimson Owl Logo">
            <span>CRIMSON OWL</span>
        </div>
        <a href="javascript:history.back()" class="back-btn">← Back</a>
    </div>
</div>

<div class="container" id="businessDetails">
    <div class="loading">Loading business details...</div>
</div>

<div class="footer">
    <p>© 2026 Crimson Owl | Ethiopian Business Directory</p>
</div>

<script>
    const GITHUB_SHOPS_URL = 'https://raw.githubusercontent.com/ignivolatusapk/crimson-owl/main/shops.json';
    const urlParams = new URLSearchParams(window.location.search);
    const businessId = parseInt(urlParams.get('id'));

    function getStarRating(rating, size=18) {
        const full = Math.floor(rating);
        let stars = '';
        for(let i = 0; i < full; i++) {
            stars += `<svg width="${size}" height="${size}" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>`;
        }
        for(let i = stars.length / size; i < 5; i++) {
            stars += `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="#ccc"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>`;
        }
        return stars;
    }

    async function loadBusiness() {
        try {
            const response = await fetch(GITHUB_SHOPS_URL + '?t=' + Date.now());
            const data = await response.json();
            const business = data.shops.find(s => s.id === businessId && s.status === 'active');
            
            if (!business) {
                document.getElementById('businessDetails').innerHTML = '<div class="loading">Business not found</div>';
                return;
            }

            // Track view
            let views = parseInt(localStorage.getItem(`views_${businessId}`) || '0');
            views++;
            localStorage.setItem(`views_${businessId}`, views);
            
            const today = new Date().toDateString();
            let dailyViews = JSON.parse(localStorage.getItem('crimsonowl_views') || '{}');
            dailyViews[today] = (dailyViews[today] || 0) + 1;
            localStorage.setItem('crimsonowl_views', JSON.stringify(dailyViews));

            // Load reviews
            const reviews = JSON.parse(localStorage.getItem(`reviews_${businessId}`) || '[]');

            const hoursHtml = business.hours ? 
                `<li><span>Monday</span><span>${business.hours.monday || 'Closed'}</span></li>
                 <li><span>Tuesday</span><span>${business.hours.tuesday || 'Closed'}</span></li>
                 <li><span>Wednesday</span><span>${business.hours.wednesday || 'Closed'}</span></li>
                 <li><span>Thursday</span><span>${business.hours.thursday || 'Closed'}</span></li>
                 <li><span>Friday</span><span>${business.hours.friday || 'Closed'}</span></li>
                 <li><span>Saturday</span><span>${business.hours.saturday || 'Closed'}</span></li>
                 <li><span>Sunday</span><span>${business.hours.sunday || 'Closed'}</span></li>` :
                '<li>Hours not available</li>';

            const galleryHtml = business.gallery && business.gallery.length ? 
                business.gallery.map(p => `<div class="gallery-item" onclick="window.open('${p}','_blank')"><img src="${p}"></div>`).join('') :
                '<p>No photos available</p>';

            const reviewsHtml = reviews.map(r => `
                <div class="review-item">
                    <div class="review-header">
                        <span class="reviewer-name">${r.name}</span>
                        <span class="review-date">${r.date}</span>
                    </div>
                    <div class="review-stars">${getStarRating(r.rating, 14)}</div>
                    <div class="review-text">${r.comment}</div>
                </div>
            `).join('');

            const html = `
                <div class="business-header">
                    <div>
                        ${business.logoUrl ? 
                            `<img src="${business.logoUrl}" class="business-logo-large">` : 
                            `<div class="business-logo-large" style="display:flex;align-items:center;justify-content:center;background:#f0f0f0;font-size:48px;">🏢</div>`
                        }
                    </div>
                    <div class="business-title">
                        <div>
                            <span class="business-category">${business.category}</span>
                            ${business.featured ? '<span class="featured-badge">⭐ FEATURED</span>' : ''}
                        </div>
                        <h1>${business.shopName}</h1>
                        <div class="business-rating">
                            <div class="stars">${getStarRating(business.rating || 0)}</div>
                            <span>${business.rating || 0} (${business.reviews || 0} reviews)</span>
                        </div>
                    </div>
                </div>

                <div class="info-grid">
                    <div class="info-card">
                        <h3>📞 Contact</h3>
                        <div class="contact-item">
                            <div class="contact-icon">📱</div>
                            <div><div class="contact-label">Phone</div><a href="tel:${business.phone}" class="contact-value">${business.phone}</a></div>
                        </div>
                        <div class="contact-item">
                            <div class="contact-icon">✉️</div>
                            <div><div class="contact-label">Email</div><a href="mailto:${business.email}" class="contact-value">${business.email}</a></div>
                        </div>
                        <div class="contact-item">
                            <div class="contact-icon">📍</div>
                            <div><div class="contact-label">Address</div><div class="contact-value">${business.address}</div></div>
                        </div>
                    </div>
                    <div class="info-card">
                        <h3>🕒 Hours</h3>
                        <ul class="hours-list">${hoursHtml}</ul>
                    </div>
                </div>

                <div class="photo-gallery">
                    <h3>📸 Photo Gallery</h3>
                    <div class="gallery-grid">${galleryHtml}</div>
                </div>

                <div class="description-section">
                    <h3>📖 About ${business.shopName}</h3>
                    <p>${business.fullDescription || business.description}</p>
                </div>

                <div class="reviews-section">
                    <h3>⭐ Reviews</h3>
                    <div id="reviewsList">${reviewsHtml || '<p>No reviews yet. Be the first to review!</p>'}</div>
                    <div class="write-review">
                        <h4 style="margin-bottom: 1rem;">Write a Review</h4>
                        <input type="text" id="reviewerName" placeholder="Your Name">
                        <select id="reviewRating">
                            <option value="5">⭐⭐⭐⭐⭐ - Excellent</option>
                            <option value="4">⭐⭐⭐⭐ - Good</option>
                            <option value="3">⭐⭐⭐ - Average</option>
                            <option value="2">⭐⭐ - Poor</option>
                            <option value="1">⭐ - Terrible</option>
                        </select>
                        <textarea id="reviewComment" rows="3" placeholder="Your review..."></textarea>
                        <button class="submit-review" onclick="submitReview(${business.id})">Submit Review</button>
                    </div>
                </div>

                <div class="action-buttons">
                    <a href="${business.shopUrl}" target="_blank" class="action-btn website">🌐 Visit Website</a>
                    <a href="tel:${business.phone}" class="action-btn call">📞 Call Now</a>
                    <a href="https://maps.google.com/?q=${encodeURIComponent(business.address)}" target="_blank" class="action-btn direction">🗺️ Get Directions</a>
                </div>
            `;

            document.getElementById('businessDetails').innerHTML = html;
        } catch(e) {
            document.getElementById('businessDetails').innerHTML = '<div class="loading">Error loading business details</div>';
        }
    }

    function submitReview(businessId) {
        const name = document.getElementById('reviewerName')?.value;
        const rating = document.getElementById('reviewRating')?.value;
        const comment = document.getElementById('reviewComment')?.value;
        
        if (!name || !comment) {
            alert('Please enter your name and review');
            return;
        }
        
        const reviews = JSON.parse(localStorage.getItem(`reviews_${businessId}`) || '[]');
        reviews.unshift({
            name: name,
            rating: parseInt(rating),
            comment: comment,
            date: new Date().toLocaleDateString()
        });
        localStorage.setItem(`reviews_${businessId}`, JSON.stringify(reviews));
        loadBusiness();
    }

    loadBusiness();
</script>

</body>
</html>
