<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>All Businesses - Crimson Owl</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0a;
        }

        .navbar {
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 16px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-logo img {
            height: 36px;
            width: auto;
        }

        .nav-logo span {
            color: white;
            font-weight: 700;
            font-size: 18px;
        }

        .nav-links {
            display: flex;
            gap: 24px;
            align-items: center;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 14px;
        }

        .apply-nav {
            background: #8B0000;
            color: white !important;
            padding: 8px 20px;
            border-radius: 30px;
        }

        .menu-btn {
            display: none;
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        .mobile-menu {
            display: none;
            position: fixed;
            top: 70px;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.98);
            z-index: 999;
            padding: 16px;
        }

        .mobile-menu.show {
            display: block;
        }

        .mobile-menu a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        .page-header {
            margin-bottom: 32px;
        }

        .page-header h1 {
            font-size: 32px;
            color: white;
            margin-bottom: 8px;
        }

        .page-header p {
            color: #aaa;
            font-size: 15px;
        }

        .search-box {
            width: 100%;
            max-width: 350px;
            padding: 12px 18px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 40px;
            color: white;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .search-box:focus {
            outline: none;
            border-color: #8B0000;
        }

        .category-filter {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 8px 0 20px 0;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
            scrollbar-color: #8B0000 #333;
            flex-wrap: wrap;
        }

        .category-filter::-webkit-scrollbar {
            height: 4px;
        }

        .category-filter::-webkit-scrollbar-track {
            background: #333;
            border-radius: 10px;
        }

        .category-filter::-webkit-scrollbar-thumb {
            background: #8B0000;
            border-radius: 10px;
        }

        .filter-btn {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #aaa;
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .filter-btn.active {
            background: #8B0000;
            color: white;
            border-color: #8B0000;
        }

        .filter-btn:hover {
            background: #333;
        }

        .shops-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 24px;
        }

        .shop-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
        }

        .shop-card:hover {
            transform: translateY(-4px);
            border-color: #8B0000;
        }

        .shop-photo {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #0a0a0a;
        }

        .shop-info {
            padding: 20px;
        }

        .shop-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .shop-logo-img {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            object-fit: cover;
            background: #0a0a0a;
        }

        .shop-name {
            font-size: 18px;
            font-weight: 600;
            color: white;
            margin-bottom: 4px;
        }

        .shop-category {
            font-size: 12px;
            color: #888;
        }

        .shop-desc {
            font-size: 13px;
            color: #aaa;
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .shop-rating {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
        }

        .stars {
            display: flex;
            gap: 2px;
        }

        .stars svg {
            width: 14px;
            height: 14px;
            fill: #ffc73a;
        }

        .rating-value {
            color: #ffc73a;
            font-size: 12px;
            font-weight: 500;
        }

        .featured-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #000;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: bold;
        }

        .shop-card {
            position: relative;
        }

        .shop-details-link {
            color: #8B0000;
            font-size: 13px;
            text-decoration: none;
            font-weight: 500;
            display: inline-block;
            margin-top: 10px;
        }

        .shop-details-link:hover {
            text-decoration: underline;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            background: #1a1a1a;
            border-radius: 20px;
        }

        .empty-state p {
            color: #aaa;
            margin-bottom: 20px;
        }

        .empty-state .btn-primary {
            background: #8B0000;
            color: white;
            padding: 12px 28px;
            border-radius: 40px;
            text-decoration: none;
            display: inline-block;
        }

        .footer {
            background: rgba(0, 0, 0, 0.95);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 24px;
            text-align: center;
            margin-top: 40px;
        }

        .footer p {
            color: #666;
            font-size: 12px;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: #aaa;
        }

        @media (max-width: 768px) {
            .container { padding: 20px 16px; }
            .shops-grid { grid-template-columns: 1fr; gap: 16px; }
            .nav-links { display: none; }
            .menu-btn { display: block; }
            .page-header h1 { font-size: 24px; }
            .shop-photo { height: 160px; }
            .shop-info { padding: 16px; }
            .shop-name { font-size: 16px; }
            .category-filter { flex-wrap: nowrap; }
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="nav-container">
        <div class="nav-logo">
            <img src="images/logo.png" alt="Crimson Owl Logo">
            <span>CRIMSON OWL</span>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="browse-shops.html">Businesses</a>
            <a href="apply.html" class="apply-nav">List Your Business</a>
        </div>
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
    </div>
</div>

<div class="mobile-menu" id="mobileMenu">
    <a href="index.html">Home</a>
    <a href="browse-shops.html">Businesses</a>
    <a href="apply.html">List Your Business</a>
</div>

<div class="container">
    <div class="page-header">
        <h1>All Businesses</h1>
        <p>Browse hotels, cafes, restaurants, shops and more in Ethiopia</p>
    </div>

    <input type="text" class="search-box" id="searchInput" placeholder="🔍 Search businesses...">

    <!-- ALL CATEGORIES - Now matching admin panel -->
    <div class="category-filter" id="categoryFilter">
        <button class="filter-btn active" data-category="all">All</button>
        
        <!-- 🏨 Hospitality -->
        <button class="filter-btn" data-category="🏨 Hotel & Resort">🏨 Hotels</button>
        <button class="filter-btn" data-category="☕ Cafe & Coffee Shop">☕ Cafes</button>
        <button class="filter-btn" data-category="🍽️ Restaurant & Dining">🍽️ Restaurants</button>
        <button class="filter-btn" data-category="🍺 Bar & Lounge">🍺 Bars & Lounges</button>
        
        <!-- ✈️ Travel -->
        <button class="filter-btn" data-category="✈️ Airline Company">✈️ Airlines</button>
        <button class="filter-btn" data-category="🚗 Travel Agency">🚗 Travel Agencies</button>
        <button class="filter-btn" data-category="🚌 Bus & Transport">🚌 Bus & Transport</button>
        <button class="filter-btn" data-category="🚕 Taxi & Ride Share">🚕 Taxi & Ride Share</button>
        <button class="filter-btn" data-category="🏖️ Tour Operator">🏖️ Tour Operators</button>
        
        <!-- 🏛️ Government -->
        <button class="filter-btn" data-category="🏛️ Government Office">🏛️ Government</button>
        <button class="filter-btn" data-category="📜 Embassy & Consulate">📜 Embassies</button>
        <button class="filter-btn" data-category="🏥 Public Hospital">🏥 Public Hospitals</button>
        <button class="filter-btn" data-category="📚 Public Library">📚 Libraries</button>
        <button class="filter-btn" data-category="⚖️ Court & Legal Services">⚖️ Courts</button>
        
        <!-- 💼 Private Companies -->
        <button class="filter-btn" data-category="💼 Corporate Company">💼 Corporations</button>
        <button class="filter-btn" data-category="🏦 Bank & Financial">🏦 Banks</button>
        <button class="filter-btn" data-category="📞 Telecom & Internet">📞 Telecom</button>
        <button class="filter-btn" data-category="⚡ Energy & Utilities">⚡ Energy</button>
        <button class="filter-btn" data-category="🏗️ Construction & Real Estate">🏗️ Construction</button>
        
        <!-- 🛍️ Retail -->
        <button class="filter-btn" data-category="👗 Fashion & Clothing">👗 Fashion</button>
        <button class="filter-btn" data-category="📱 Electronics & Gadgets">📱 Electronics</button>
        <button class="filter-btn" data-category="🛒 Supermarket & Grocery">🛒 Supermarkets</button>
        <button class="filter-btn" data-category="💍 Jewelry & Accessories">💍 Jewelry</button>
        <button class="filter-btn" data-category="📚 Bookstore & Stationery">📚 Bookstores</button>
        
        <!-- 🏥 Health -->
        <button class="filter-btn" data-category="🏥 Private Hospital & Clinic">🏥 Private Hospitals</button>
        <button class="filter-btn" data-category="💊 Pharmacy & Drug Store">💊 Pharmacies</button>
        <button class="filter-btn" data-category="🏋️ Gym & Fitness Center">🏋️ Gyms</button>
        <button class="filter-btn" data-category="🧘 Spa & Wellness">🧘 Spas</button>
        <button class="filter-btn" data-category="🦷 Dental Clinic">🦷 Dental Clinics</button>
        
        <!-- 🎓 Education -->
        <button class="filter-btn" data-category="🏫 University & College">🏫 Universities</button>
        <button class="filter-btn" data-category="📖 Private School">📖 Private Schools</button>
        <button class="filter-btn" data-category="💻 Training Center">💻 Training Centers</button>
        <button class="filter-btn" data-category="🎓 Online Learning">🎓 Online Learning</button>
        
        <!-- 🎨 Arts -->
        <button class="filter-btn" data-category="🎬 Cinema & Theater">🎬 Cinemas</button>
        <button class="filter-btn" data-category="🖼️ Art Gallery">🖼️ Art Galleries</button>
        <button class="filter-btn" data-category="🎵 Music Venue">🎵 Music Venues</button>
        <button class="filter-btn" data-category="🎪 Event & Conference Center">🎪 Event Centers</button>
        
        <!-- 🔧 Services -->
        <button class="filter-btn" data-category="🔧 Repair & Maintenance">🔧 Repair</button>
        <button class="filter-btn" data-category="💇 Salon & Barber">💇 Salons</button>
        <button class="filter-btn" data-category="📸 Photography Studio">📸 Photography</button>
        <button class="filter-btn" data-category="⚖️ Legal & Law Firm">⚖️ Law Firms</button>
        <button class="filter-btn" data-category="📊 Accounting & Consulting">📊 Accounting</button>
    </div>

    <div id="shopsList">
        <div class="loading">Loading businesses...</div>
    </div>
</div>

<div class="footer">
    <p>© 2026 Crimson Owl | Ethiopian Business Directory</p>
</div>

<script>
    // GitHub RAW URL - Loads your shops.json
    const GITHUB_SHOPS_URL = 'https://raw.githubusercontent.com/ignivolatusapk/crimson-owl/main/shops.json';
    
    let shops = [];
    let currentCategory = 'all';
    let currentSearch = '';

    // Helper function to generate star rating HTML
    function getStarRating(rating) {
        const fullStars = Math.floor(rating);
        const hasHalfStar = rating % 1 >= 0.5;
        let stars = '';
        for (let i = 0; i < fullStars; i++) {
            stars += `<svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>`;
        }
        if (hasHalfStar) {
            stars += `<svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>`;
        }
        for (let i = stars.length / 24; i < 5; i++) {
            stars += `<svg viewBox="0 0 24 24" fill="none" stroke="#555"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>`;
        }
        return stars;
    }

    async function loadShops() {
        try {
            const response = await fetch(GITHUB_SHOPS_URL + '?t=' + Date.now());
            if (!response.ok) throw new Error('Failed to load');
            const data = await response.json();
            shops = data.shops.filter(s => s.status === 'active');
            displayShops();
        } catch (error) {
            console.error('Error loading shops:', error);
            document.getElementById('shopsList').innerHTML = `
                <div class="empty-state">
                    <p>⚠️ Unable to load businesses. Please check back later.</p>
                    <a href="apply.html" class="btn-primary">List Your Business →</a>
                </div>
            `;
        }
    }

    function displayShops() {
        let filtered = shops;

        if (currentCategory !== 'all') {
            filtered = filtered.filter(shop => shop.category === currentCategory);
        }

        if (currentSearch) {
            filtered = filtered.filter(shop =>
                shop.shopName.toLowerCase().includes(currentSearch) ||
                shop.category.toLowerCase().includes(currentSearch) ||
                shop.description.toLowerCase().includes(currentSearch)
            );
        }

        const container = document.getElementById('shopsList');

        if (filtered.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <p>✨ No businesses found</p>
                    <a href="apply.html" class="btn-primary">List Your Business →</a>
                </div>
            `;
            return;
        }

        container.innerHTML = `
            <div class="shops-grid">
                ${filtered.map(shop => `
                    <div class="shop-card" onclick="viewBusiness(${shop.id})">
                        ${shop.featured ? '<div class="featured-badge">⭐ FEATURED</div>' : ''}
                        <img src="${shop.storePhoto || 'https://images.unsplash.com/photo-1441984904996-e0b6ba067e0b?w=400'}" 
                             class="shop-photo" 
                             alt="${shop.shopName}"
                             onerror="this.src='https://images.unsplash.com/photo-1441984904996-e0b6ba067e0b?w=400'">
                        <div class="shop-info">
                            <div class="shop-header">
                                ${shop.logoUrl && shop.logoUrl !== '' ? 
                                    `<img src="${shop.logoUrl}" class="shop-logo-img" alt="${shop.shopName}" onerror="this.src=''">` : 
                                    `<div class="shop-logo-img" style="display: flex; align-items: center; justify-content: center; font-size: 24px;">🏢</div>`
                                }
                                <div>
                                    <div class="shop-name">${shop.shopName}</div>
                                    <div class="shop-category">${shop.category}</div>
                                </div>
                            </div>
                            <div class="shop-desc">${shop.description.substring(0, 100)}${shop.description.length > 100 ? '...' : ''}</div>
                            ${shop.rating ? `
                                <div class="shop-rating">
                                    <div class="stars">${getStarRating(shop.rating)}</div>
                                    <span class="rating-value">${shop.rating}</span>
                                </div>
                            ` : ''}
                            <div class="shop-details-link">View Details →</div>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
    }

    function viewBusiness(id) {
        window.location.href = `business-details.html?id=${id}`;
    }

    function filterShops() {
        currentSearch = document.getElementById('searchInput').value.toLowerCase();
        displayShops();
    }

    // Set up category filters
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentCategory = this.dataset.category;
            displayShops();
        });
    });

    document.getElementById('searchInput').addEventListener('keyup', filterShops);

    function toggleMenu() {
        document.getElementById('mobileMenu').classList.toggle('show');
    }

    // Close mobile menu when clicking outside
    document.addEventListener('click', function(e) {
        const menu = document.getElementById('mobileMenu');
        const menuBtn = document.querySelector('.menu-btn');
        if (menu && menu.classList.contains('show') && !menu.contains(e.target) && !menuBtn.contains(e.target)) {
            menu.classList.remove('show');
        }
    });

    loadShops();
</script>

</body>
</html>
