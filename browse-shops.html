<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Shops - Crimson Owl</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0a;
        }

        .navbar {
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 16px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-logo img {
            height: 36px;
            width: auto;
        }

        .nav-logo span {
            color: white;
            font-weight: 700;
            font-size: 18px;
        }

        .nav-links {
            display: flex;
            gap: 24px;
            align-items: center;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 14px;
        }

        .apply-nav {
            background: #8B0000;
            color: white !important;
            padding: 8px 20px;
            border-radius: 30px;
        }

        .menu-btn {
            display: none;
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        .mobile-menu {
            display: none;
            position: fixed;
            top: 70px;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.98);
            z-index: 999;
            padding: 16px;
        }

        .mobile-menu.show {
            display: block;
        }

        .mobile-menu a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        .page-header {
            margin-bottom: 32px;
        }

        .page-header h1 {
            font-size: 32px;
            color: white;
            margin-bottom: 8px;
        }

        .page-header p {
            color: #aaa;
            font-size: 15px;
        }

        .search-box {
            width: 100%;
            max-width: 350px;
            padding: 12px 18px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 40px;
            color: white;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .search-box:focus {
            outline: none;
            border-color: #8B0000;
        }

        .category-filter {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 8px 0 20px 0;
            -webkit-overflow-scrolling: touch;
        }

        .category-filter::-webkit-scrollbar {
            display: none;
        }

        .filter-btn {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #aaa;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
        }

        .filter-btn.active {
            background: #8B0000;
            color: white;
            border-color: #8B0000;
        }

        .shops-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .shop-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 20px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .shop-card:hover {
            transform: translateY(-4px);
            border-color: #8B0000;
        }

        .shop-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }

        .shop-logo-img {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            object-fit: cover;
            background: #0a0a0a;
        }

        .shop-name {
            font-size: 18px;
            font-weight: 600;
            color: white;
            margin-bottom: 4px;
        }

        .shop-category {
            font-size: 12px;
            color: #888;
        }

        .shop-desc {
            font-size: 13px;
            color: #aaa;
            line-height: 1.5;
            margin-bottom: 16px;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            background: #1a1a1a;
            border-radius: 20px;
        }

        .empty-state p {
            color: #aaa;
        }

        .footer {
            background: rgba(0, 0, 0, 0.95);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 24px;
            text-align: center;
            margin-top: 40px;
        }

        .footer p {
            color: #666;
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .container { padding: 24px 16px; }
            .shops-grid { grid-template-columns: 1fr; }
            .nav-links { display: none; }
            .menu-btn { display: block; }
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="nav-container">
        <div class="nav-logo">
            <img src="images/logo.png" alt="Crimson Owl Logo">
            <span>CRIMSON OWL</span>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="browse-shops.html">Shops</a>
            <a href="apply.html" class="apply-nav">Open a Shop</a>
        </div>
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
    </div>
</div>

<div class="mobile-menu" id="mobileMenu">
    <a href="index.html">Home</a>
    <a href="browse-shops.html">Browse Shops</a>
    <a href="apply.html">Open a Shop</a>
</div>

<div class="container">
    <div class="page-header">
        <h1>All Shops</h1>
        <p>Browse online stores from Ethiopia</p>
    </div>

    <input type="text" class="search-box" id="searchInput" placeholder="🔍 Search shops...">
    
    <div class="category-filter" id="categoryFilter">
        <button class="filter-btn active" data-category="all">All</button>
        <button class="filter-btn" data-category="Fashion & Clothing">Fashion</button>
        <button class="filter-btn" data-category="Food & Restaurant">Food</button>
        <button class="filter-btn" data-category="Electronics">Electronics</button>
        <button class="filter-btn" data-category="Handicrafts & Art">Crafts</button>
        <button class="filter-btn" data-category="Home & Living">Home</button>
        <button class="filter-btn" data-category="Beauty & Health">Beauty</button>
    </div>
    
    <div id="shopsList">
        <div style="text-align: center; padding: 40px; color: #aaa;">Loading shops...</div>
    </div>
</div>

<div class="footer">
    <p>© 2026 Crimson Owl | Digital Shops Directory</p>
</div>

<script>
    // Your GitHub username
    const GITHUB_USERNAME = 'ignivolatusapk';
    const GITHUB_SHOPS_URL = `https://raw.githubusercontent.com/${GITHUB_USERNAME}/crimson-owl/main/shops.json`;
    
    let shops = [];
    let currentCategory = 'all';
    let currentSearch = '';

    async function loadShops() {
        try {
            const response = await fetch(GITHUB_SHOPS_URL + '?t=' + Date.now());
            if (!response.ok) throw new Error();
            const data = await response.json();
            shops = data.shops.filter(s => s.status === 'active');
            displayShops();
        } catch (error) {
            document.getElementById('shopsList').innerHTML = '<div class="empty-state"><p>⚠️ Unable to load shops. Make sure shops.json exists in your GitHub repository.</p></div>';
        }
    }

    function displayShops() {
        let filtered = shops;
        
        if (currentCategory !== 'all') {
            filtered = filtered.filter(shop => shop.category === currentCategory);
        }
        
        if (currentSearch) {
            filtered = filtered.filter(shop => 
                shop.shopName.toLowerCase().includes(currentSearch) ||
                shop.category.toLowerCase().includes(currentSearch) ||
                shop.description.toLowerCase().includes(currentSearch)
            );
        }
        
        const container = document.getElementById('shopsList');
        
        if (filtered.length === 0) {
            container.innerHTML = '<div class="empty-state"><p>✨ No shops found</p></div>';
            return;
        }
        
        container.innerHTML = `
            <div class="shops-grid">
                ${filtered.map(shop => `
                    <div class="shop-card" onclick="window.open('${shop.shopUrl}', '_blank')">
                        <div class="shop-header">
                            ${shop.logoUrl && shop.logoUrl !== '' ? 
                                `<img src="${shop.logoUrl}" class="shop-logo-img" alt="${shop.shopName}" onerror="this.src=''">` : 
                                `<div class="shop-logo-img" style="display: flex; align-items: center; justify-content: center; font-size: 28px; background: #1a1a1a;">🦉</div>`
                            }
                            <div>
                                <div class="shop-name">${shop.shopName}</div>
                                <div class="shop-category">${shop.category}</div>
                            </div>
                        </div>
                        <div class="shop-desc">${shop.description.substring(0, 120)}${shop.description.length > 120 ? '...' : ''}</div>
                    </div>
                `).join('')}
            </div>
        `;
    }

    function filterShops() {
        currentSearch = document.getElementById('searchInput').value.toLowerCase();
        displayShops();
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentCategory = this.dataset.category;
            displayShops();
        });
    });

    document.getElementById('searchInput').addEventListener('keyup', filterShops);
    
    function toggleMenu() {
        document.getElementById('mobileMenu').classList.toggle('show');
    }
    
    loadShops();
</script>

</body>
</html>
