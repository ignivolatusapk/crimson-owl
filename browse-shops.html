<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>All Shops - Ignivolatus Store</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-image: url('images/background.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            position: relative;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: -1;
        }

        .navbar {
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 12px 20px;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-btn {
            color: white;
            text-decoration: none;
            font-size: 16px;
        }

        .logo {
            font-size: 18px;
            font-weight: 600;
            color: white;
            flex: 1;
        }

        .apply-small {
            background: white;
            color: black;
            padding: 6px 16px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .search-box {
            width: 100%;
            max-width: 350px;
            padding: 12px 18px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            color: white;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .search-box:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.4);
        }

        .category-filter {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 8px 0 20px 0;
            margin-bottom: 8px;
            -webkit-overflow-scrolling: touch;
        }

        .category-filter::-webkit-scrollbar {
            display: none;
        }

        .filter-btn {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #aaa;
            padding: 7px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
        }

        .filter-btn.active {
            background: white;
            color: black;
            border-color: white;
        }

        .shops-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .shop-card {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .shop-card:hover {
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .shop-icon {
            font-size: 32px;
            margin-bottom: 12px;
        }

        .shop-name {
            font-size: 17px;
            font-weight: 600;
            color: white;
            margin-bottom: 6px;
        }

        .shop-category {
            font-size: 12px;
            color: #888;
            margin-bottom: 10px;
        }

        .shop-desc {
            font-size: 13px;
            color: #aaa;
            line-height: 1.45;
            margin-bottom: 16px;
        }

        .shop-url {
            font-size: 11px;
            color: #00cc00;
            word-break: break-all;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
        }

        .empty-state p {
            color: #aaa;
            margin-bottom: 20px;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: white;
        }

        .footer {
            background: rgba(0, 0, 0, 0.95);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px;
            text-align: center;
            margin-top: 50px;
        }

        .footer p {
            color: #555;
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px 16px;
            }
            
            .shops-grid {
                gap: 14px;
            }
            
            .shop-card {
                padding: 16px;
            }
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="nav-container">
        <a href="index.html" class="back-btn">←</a>
        <div class="logo">All Shops</div>
        <a href="apply.html" class="apply-small">Open a Shop</a>
    </div>
</div>

<div class="container">
    <input type="text" class="search-box" id="searchInput" placeholder="🔍 Search shops...">
    
    <div class="category-filter" id="categoryFilter">
        <button class="filter-btn active" data-category="all">All</button>
        <button class="filter-btn" data-category="Fashion & Clothing">Fashion</button>
        <button class="filter-btn" data-category="Food & Restaurant">Food</button>
        <button class="filter-btn" data-category="Electronics">Electronics</button>
        <button class="filter-btn" data-category="Handicrafts & Art">Crafts</button>
        <button class="filter-btn" data-category="Home & Living">Home</button>
        <button class="filter-btn" data-category="Beauty & Health">Beauty</button>
    </div>
    
    <div id="shopsList">
        <div class="loading">Loading shops...</div>
    </div>
</div>

<div class="footer">
    <p>© 2024 Ignivolatus Store</p>
</div>

<script>
    const GITHUB_RAW_URL = 'https://raw.githubusercontent.com/YOUR_USERNAME/ignivolatus-store/main/shops.json';
    
    let shops = [];
    let currentCategory = 'all';
    let currentSearch = '';

    async function loadShops() {
        try {
            const response = await fetch(GITHUB_RAW_URL);
            if (!response.ok) throw new Error();
            const data = await response.json();
            shops = data.shops.filter(shop => shop.status === 'active');
            displayShops();
        } catch (error) {
            document.getElementById('shopsList').innerHTML = `
                <div class="empty-state">
                    <p>⚠️ Unable to load shops</p>
                    <p>Please check back later</p>
                </div>
            `;
        }
    }

    function displayShops() {
        let filtered = shops;
        
        if (currentCategory !== 'all') {
            filtered = filtered.filter(shop => shop.category === currentCategory);
        }
        
        if (currentSearch) {
            filtered = filtered.filter(shop => 
                shop.shopName.toLowerCase().includes(currentSearch) ||
                shop.category.toLowerCase().includes(currentSearch) ||
                shop.description.toLowerCase().includes(currentSearch)
            );
        }
        
        const container = document.getElementById('shopsList');
        
        if (filtered.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <p>✨ No shops found</p>
                    <a href="apply.html" style="color: white;">Open a shop →</a>
                </div>
            `;
            return;
        }
        
        container.innerHTML = `
            <div class="shops-grid">
                ${filtered.map(shop => `
                    <div class="shop-card" onclick="window.open('${shop.shopUrl}', '_blank')">
                        <div class="shop-icon">🏪</div>
                        <div class="shop-name">${shop.shopName}</div>
                        <div class="shop-category">${shop.category}</div>
                        <div class="shop-desc">${shop.description.substring(0, 100)}${shop.description.length > 100 ? '...' : ''}</div>
                        <div class="shop-url">${shop.shopUrl.replace('https://', '')}</div>
                    </div>
                `).join('')}
            </div>
        `;
    }

    function filterShops() {
        currentSearch = document.getElementById('searchInput').value.toLowerCase();
        displayShops();
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentCategory = this.dataset.category;
            displayShops();
        });
    });

    document.getElementById('searchInput').addEventListener('keyup', filterShops);
    
    loadShops();
</script>

</body>
</html>
