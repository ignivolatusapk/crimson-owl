<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>All Businesses - Crimson Owl</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0a;
        }

        .navbar {
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 16px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-logo img {
            height: 36px;
            width: auto;
        }

        .nav-logo span {
            color: white;
            font-weight: 700;
            font-size: 18px;
        }

        .nav-links {
            display: flex;
            gap: 24px;
            align-items: center;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 14px;
        }

        .apply-nav {
            background: #8B0000;
            color: white !important;
            padding: 8px 20px;
            border-radius: 30px;
        }

        .menu-btn {
            display: none;
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        .mobile-menu {
            display: none;
            position: fixed;
            top: 70px;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.98);
            z-index: 999;
            padding: 16px;
        }

        .mobile-menu.show {
            display: block;
        }

        .mobile-menu a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        .page-header {
            margin-bottom: 32px;
        }

        .page-header h1 {
            font-size: 32px;
            color: white;
            margin-bottom: 8px;
        }

        .page-header p {
            color: #aaa;
            font-size: 15px;
        }

        .search-box {
            width: 100%;
            max-width: 350px;
            padding: 12px 18px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 40px;
            color: white;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .search-box:focus {
            outline: none;
            border-color: #8B0000;
        }

        .category-filter {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 8px 0 20px 0;
            -webkit-overflow-scrolling: touch;
        }

        .category-filter::-webkit-scrollbar {
            height: 4px;
        }

        .category-filter::-webkit-scrollbar-track {
            background: #333;
            border-radius: 10px;
        }

        .category-filter::-webkit-scrollbar-thumb {
            background: #8B0000;
            border-radius: 10px;
        }

        .filter-btn {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #aaa;
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .filter-btn.active {
            background: #8B0000;
            color: white;
            border-color: #8B0000;
        }

        .shops-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 24px;
        }

        /* Updated Shop Card with Store Photo */
        .shop-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
        }

        .shop-card:hover {
            transform: translateY(-4px);
            border-color: #8B0000;
        }

        .shop-photo {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #0a0a0a;
        }

        .shop-info {
            padding: 20px;
        }

        .shop-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .shop-logo-img {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            object-fit: cover;
            background: #0a0a0a;
        }

        .shop-name {
            font-size: 18px;
            font-weight: 600;
            color: white;
            margin-bottom: 4px;
        }

        .shop-category {
            font-size: 12px;
            color: #888;
        }

        .shop-desc {
            font-size: 13px;
            color: #aaa;
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .shop-details-link {
            color: #8B0000;
            font-size: 13px;
            text-decoration: none;
            font-weight: 500;
            display: inline-block;
        }

        .shop-details-link:hover {
            text-decoration: underline;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            background: #1a1a1a;
            border-radius: 20px;
        }

        .empty-state p {
            color: #aaa;
        }

        .footer {
            background: rgba(0, 0, 0, 0.95);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 24px;
            text-align: center;
            margin-top: 40px;
        }

        .footer p {
            color: #666;
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .container { padding: 20px 16px; }
            .shops-grid { grid-template-columns: 1fr; gap: 16px; }
            .nav-links { display: none; }
            .menu-btn { display: block; }
            .page-header h1 { font-size: 24px; }
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="nav-container">
        <div class="nav-logo">
            <img src="images/logo.png" alt="Crimson Owl Logo">
            <span>CRIMSON OWL</span>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="browse-shops.html">Businesses</a>
            <a href="apply.html" class="apply-nav">List Your Business</a>
        </div>
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
    </div>
</div>

<div class="mobile-menu" id="mobileMenu">
    <a href="index.html">Home</a>
    <a href="browse-shops.html">Businesses</a>
    <a href="apply.html">List Your Business</a>
</div>

<div class="container">
    <div class="page-header">
        <h1>All Businesses</h1>
        <p>Browse hotels, cafes, restaurants, shops and more in Ethiopia</p>
    </div>

    <input type="text" class="search-box" id="searchInput" placeholder="🔍 Search businesses...">

    <div class="category-filter" id="categoryFilter">
        <button class="filter-btn active" data-category="all">All</button>
        <button class="filter-btn" data-category="🏨 Hotel & Resort">🏨 Hotels</button>
        <button class="filter-btn" data-category="☕ Cafe & Coffee Shop">☕ Cafes</button>
        <button class="filter-btn" data-category="🍽️ Restaurant & Dining">🍽️ Restaurants</button>
        <button class="filter-btn" data-category="Fashion & Clothing">👗 Fashion</button>
        <button class="filter-btn" data-category="Electronics">📱 Electronics</button>
        <button class="filter-btn" data-category="🏛️ Government Office">🏛️ Government</button>
        <button class="filter-btn" data-category="💼 Corporate Company">💼 Corporate</button>
        <button class="filter-btn" data-category="🏦 Bank & Financial">🏦 Banks</button>
    </div>

    <div id="shopsList">
        <div style="text-align: center; padding: 40px; color: #aaa;">Loading businesses...</div>
    </div>
</div>

<div class="footer">
    <p>© 2026 Crimson Owl | Ethiopian Business Directory</p>
</div>

<script>
    // Complete businesses data with store photos
    const businessesData = [
        {
            id: 1,
            shopName: "Habesha Traditional Fashion",
            category: "Fashion & Clothing",
            description: "Beautiful traditional Ethiopian clothing, habesha kemis, and modern fusion wear.",
            shopUrl: "#",
            logoUrl: "",
            storePhoto: "https://images.unsplash.com/photo-1539109136881-3be0616acf4b?w=400",
            status: "active"
        },
        {
            id: 2,
            shopName: "Addis Coffee & Spice",
            category: "Food & Restaurant",
            description: "Fresh Ethiopian coffee beans, organic spices, and traditional coffee sets.",
            shopUrl: "#",
            logoUrl: "",
            storePhoto: "https://images.unsplash.com/photo-1442512595331-e89e73853f31?w=400",
            status: "active"
        },
        {
            id: 3,
            shopName: "Ethio Electronics",
            category: "Electronics",
            description: "Latest smartphones, laptops, and gadgets with warranty.",
            shopUrl: "#",
            logoUrl: "",
            storePhoto: "https://images.unsplash.com/photo-1498049794561-7780e7231661?w=400",
            status: "active"
        },
        {
            id: 4,
            shopName: "Sheraton Addis Hotel",
            category: "Hotel & Resort",
            description: "Luxury 5-star hotel in the heart of Addis Ababa with world-class amenities.",
            shopUrl: "#",
            logoUrl: "",
            storePhoto: "https://images.unsplash.com/photo-1566073771259-6a8506099945?w=400",
            status: "active"
        },
        {
            id: 5,
            shopName: "Tomoca Coffee",
            category: "Cafe & Coffee Shop",
            description: "Famous Ethiopian coffee shop serving traditional coffee since 1953.",
            shopUrl: "#",
            logoUrl: "",
            storePhoto: "https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=400",
            status: "active"
        },
        {
            id: 6,
            shopName: "Yod Abyssinia",
            category: "Restaurant & Dining",
            description: "Traditional Ethiopian restaurant with cultural shows and live music.",
            shopUrl: "#",
            logoUrl: "",
            storePhoto: "https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=400",
            status: "active"
        }
    ];

    let shops = [];
    let currentCategory = 'all';
    let currentSearch = '';

    function loadShops() {
        shops = businessesData.filter(s => s.status === 'active');
        displayShops();
    }

    function displayShops() {
        let filtered = shops;

        if (currentCategory !== 'all') {
            filtered = filtered.filter(shop => shop.category === currentCategory);
        }

        if (currentSearch) {
            filtered = filtered.filter(shop =>
                shop.shopName.toLowerCase().includes(currentSearch) ||
                shop.category.toLowerCase().includes(currentSearch) ||
                shop.description.toLowerCase().includes(currentSearch)
            );
        }

        const container = document.getElementById('shopsList');

        if (filtered.length === 0) {
            container.innerHTML = '<div class="empty-state"><p>✨ No businesses found</p></div>';
            return;
        }

        container.innerHTML = `
            <div class="shops-grid">
                ${filtered.map(shop => `
                    <div class="shop-card" onclick="viewBusiness(${shop.id})">
                        <img src="${shop.storePhoto || 'https://images.unsplash.com/photo-1441984904996-e0b6ba067e0b?w=400'}" class="shop-photo" alt="${shop.shopName}" onerror="this.src='https://images.unsplash.com/photo-1441984904996-e0b6ba067e0b?w=400'">
                        <div class="shop-info">
                            <div class="shop-header">
                                ${shop.logoUrl && shop.logoUrl !== '' ? 
                                    `<img src="${shop.logoUrl}" class="shop-logo-img" alt="${shop.shopName}">` : 
                                    `<div class="shop-logo-img" style="display: flex; align-items: center; justify-content: center; font-size: 24px;">🏢</div>`
                                }
                                <div>
                                    <div class="shop-name">${shop.shopName}</div>
                                    <div class="shop-category">${shop.category}</div>
                                </div>
                            </div>
                            <div class="shop-desc">${shop.description.substring(0, 100)}${shop.description.length > 100 ? '...' : ''}</div>
                            <span class="shop-details-link">View Details →</span>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
    }

    function viewBusiness(id) {
        window.location.href = `business-details.html?id=${id}`;
    }

    function filterShops() {
        currentSearch = document.getElementById('searchInput').value.toLowerCase();
        displayShops();
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentCategory = this.dataset.category;
            displayShops();
        });
    });

    document.getElementById('searchInput').addEventListener('keyup', filterShops);

    function toggleMenu() {
        document.getElementById('mobileMenu').classList.toggle('show');
    }

    loadShops();
</script>

</body>
</html>
