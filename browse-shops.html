<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Browse Shops - Ignivolatus Store</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-image: url('images/background.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            position: relative;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: -1;
        }

        .navbar {
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 12px 20px;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff, #a0a0a0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .back-btn {
            color: white;
            text-decoration: none;
            font-size: 16px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        /* Search */
        .search-box {
            width: 100%;
            max-width: 400px;
            padding: 12px 18px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            color: white;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .search-box:focus {
            outline: none;
            border-color: white;
        }

        /* Category Filter */
        .category-filter {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 8px 0 16px 0;
            margin-bottom: 8px;
            -webkit-overflow-scrolling: touch;
        }

        .category-filter::-webkit-scrollbar {
            display: none;
        }

        .filter-btn {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #aaa;
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: white;
            color: black;
            border-color: white;
        }

        /* Shop Cards */
        .shops-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .shop-card {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            transition: transform 0.3s;
        }

        .shop-card:hover {
            transform: translateY(-3px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .shop-name {
            font-size: 18px;
            font-weight: 600;
            color: white;
            margin-bottom: 8px;
        }

        .shop-category {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            color: #aaa;
            margin-bottom: 12px;
        }

        .shop-desc {
            color: #aaaaaa;
            font-size: 13px;
            line-height: 1.5;
            margin-bottom: 16px;
        }

        .shop-url {
            color: #00ff00;
            text-decoration: none;
            font-size: 12px;
            word-break: break-all;
            display: block;
            margin-bottom: 16px;
        }

        .visit-btn {
            width: 100%;
            background: white;
            color: black;
            padding: 10px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .visit-btn:hover {
            opacity: 0.9;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
        }

        .empty-state p {
            color: #aaa;
            margin-bottom: 20px;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: white;
        }

        .footer {
            background: rgba(0, 0, 0, 0.95);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            text-align: center;
            margin-top: 40px;
        }

        .footer p {
            color: #666;
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px 16px;
            }
            
            .shops-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            
            .shop-card {
                padding: 16px;
            }
            
            .shop-name {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="nav-container">
        <a href="index.html" class="back-btn">← Back</a>
        <div class="logo">BROWSE SHOPS</div>
        <div style="width: 50px;"></div>
    </div>
</div>

<div class="container">
    <input type="text" class="search-box" id="searchInput" placeholder="🔍 Search shops...">
    
    <div class="category-filter" id="categoryFilter">
        <button class="filter-btn active" data-category="all">All</button>
        <button class="filter-btn" data-category="Fashion & Clothing">👗 Fashion</button>
        <button class="filter-btn" data-category="Food & Restaurant">🍕 Food</button>
        <button class="filter-btn" data-category="Electronics">📱 Electronics</button>
        <button class="filter-btn" data-category="Handicrafts & Art">🎨 Crafts</button>
        <button class="filter-btn" data-category="Home & Living">🏠 Home</button>
        <button class="filter-btn" data-category="Beauty & Health">💄 Beauty</button>
    </div>
    
    <div id="shopsList">
        <div class="loading">Loading shops...</div>
    </div>
</div>

<div class="footer">
    <p>📧 Apply at ignivolatusapk@gmail.com</p>
</div>

<script>
    const GITHUB_RAW_URL = 'https://raw.githubusercontent.com/YOUR_USERNAME/ignivolatus-store/main/shops.json';
    
    let shops = [];
    let currentCategory = 'all';
    let currentSearch = '';

    async function loadShops() {
        try {
            const response = await fetch(GITHUB_RAW_URL);
            if (!response.ok) throw new Error('Failed to load');
            const data = await response.json();
            shops = data.shops.filter(shop => shop.status === 'active');
            displayShops();
        } catch (error) {
            document.getElementById('shopsList').innerHTML = `
                <div class="empty-state">
                    <p>⚠️ Unable to load shops</p>
                    <p>Please check back later</p>
                </div>
            `;
        }
    }

    function displayShops() {
        const container = document.getElementById('shopsList');
        
        let filtered = shops;
        
        if (currentCategory !== 'all') {
            filtered = filtered.filter(shop => shop.category === currentCategory);
        }
        
        if (currentSearch) {
            filtered = filtered.filter(shop => 
                shop.shopName.toLowerCase().includes(currentSearch) ||
                shop.category.toLowerCase().includes(currentSearch) ||
                shop.description.toLowerCase().includes(currentSearch)
            );
        }
        
        if (filtered.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <p>✨ No shops found</p>
                    <a href="apply.html" style="color: white;">Apply to open a shop →</a>
                </div>
            `;
            return;
        }
        
        container.innerHTML = `
            <div class="shops-grid">
                ${filtered.map(shop => `
                    <div class="shop-card">
                        <div class="shop-name">🏪 ${shop.shopName}</div>
                        <span class="shop-category">${shop.category}</span>
                        <div class="shop-desc">${shop.description.substring(0, 120)}${shop.description.length > 120 ? '...' : ''}</div>
                        <a href="${shop.shopUrl}" class="shop-url" target="_blank">${shop.shopUrl}</a>
                        <button class="visit-btn" onclick="window.open('${shop.shopUrl}', '_blank')">Visit Shop →</button>
                    </div>
                `).join('')}
            </div>
        `;
    }

    function filterShops() {
        currentSearch = document.getElementById('searchInput').value.toLowerCase();
        displayShops();
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentCategory = this.dataset.category;
            displayShops();
        });
    });

    document.getElementById('searchInput').addEventListener('keyup', filterShops);
    
    loadShops();
</script>

</body>
</html>
