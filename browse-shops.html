<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>All Businesses - Crimson Owl</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0a;
        }

        .navbar {
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 16px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-logo img {
            height: 36px;
            width: auto;
        }

        .nav-logo span {
            color: white;
            font-weight: 700;
            font-size: 18px;
        }

        .nav-links {
            display: flex;
            gap: 24px;
            align-items: center;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 14px;
        }

        .apply-nav {
            background: #8B0000;
            color: white !important;
            padding: 8px 20px;
            border-radius: 30px;
        }

        .menu-btn {
            display: none;
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        .mobile-menu {
            display: none;
            position: fixed;
            top: 70px;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.98);
            z-index: 999;
            padding: 16px;
        }

        .mobile-menu.show {
            display: block;
        }

        .mobile-menu a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        .page-header {
            margin-bottom: 32px;
        }

        .page-header h1 {
            font-size: 32px;
            color: white;
            margin-bottom: 8px;
        }

        .page-header p {
            color: #aaa;
            font-size: 15px;
        }

        .search-box {
            width: 100%;
            max-width: 350px;
            padding: 12px 18px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 40px;
            color: white;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .search-box:focus {
            outline: none;
            border-color: #8B0000;
        }

        .category-filter {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 8px 0 20px 0;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #aaa;
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .filter-btn.active {
            background: #8B0000;
            color: white;
            border-color: #8B0000;
        }

        .filter-btn:hover {
            background: #333;
        }

        .shops-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 24px;
        }

        .shop-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .shop-card:hover {
            transform: translateY(-4px);
            border-color: #8B0000;
        }

        /* Featured Badge */
        .featured-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            color: #000;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            z-index: 2;
            display: flex;
            align-items: center;
            gap: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .featured-badge::before {
            content: "⭐";
            margin-right: 4px;
        }

        .shop-photo {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #0a0a0a;
        }

        .shop-info {
            padding: 20px;
        }

        .shop-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .shop-logo-img {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            object-fit: cover;
            background: #0a0a0a;
        }

        .shop-name {
            font-size: 18px;
            font-weight: 600;
            color: white;
            margin-bottom: 4px;
        }

        .shop-category {
            font-size: 12px;
            color: #888;
        }

        .shop-desc {
            font-size: 13px;
            color: #aaa;
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .shop-rating {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
        }

        .stars {
            display: flex;
            gap: 2px;
        }

        .stars svg {
            width: 14px;
            height: 14px;
            fill: #ffc73a;
        }

        .stars svg.gray {
            fill: #444;
        }

        .rating-value {
            color: #ffc73a;
            font-size: 12px;
            font-weight: 500;
        }

        .reviews-count {
            color: #888;
            font-size: 11px;
        }

        .shop-details-link {
            color: #8B0000;
            font-size: 13px;
            text-decoration: none;
            font-weight: 500;
            display: inline-block;
            margin-top: 10px;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            background: #1a1a1a;
            border-radius: 20px;
        }

        .footer {
            background: rgba(0, 0, 0, 0.95);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 24px;
            text-align: center;
            margin-top: 40px;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: #aaa;
        }

        @media (max-width: 768px) {
            .container { padding: 20px 16px; }
            .shops-grid { grid-template-columns: 1fr; }
            .nav-links { display: none; }
            .menu-btn { display: block; }
            .shop-photo { height: 160px; }
            .category-filter { flex-wrap: nowrap; }
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="nav-container">
        <div class="nav-logo">
            <img src="images/logo.png" alt="Crimson Owl Logo">
            <span>CRIMSON OWL</span>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="browse-shops.html">Businesses</a>
            <a href="apply.html" class="apply-nav">List Your Business</a>
        </div>
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
    </div>
</div>

<div class="mobile-menu" id="mobileMenu">
    <a href="index.html">Home</a>
    <a href="browse-shops.html">Businesses</a>
    <a href="apply.html">List Your Business</a>
</div>

<div class="container">
    <div class="page-header">
        <h1>All Businesses</h1>
        <p>Browse hotels, cafes, restaurants, shops and more in Ethiopia</p>
    </div>

    <input type="text" class="search-box" id="searchInput" placeholder="🔍 Search businesses...">

    <div class="category-filter" id="categoryFilter">
        <button class="filter-btn active" data-category="all">All</button>
        <button class="filter-btn" data-category="🏨 Hotel & Resort">🏨 Hotels</button>
        <button class="filter-btn" data-category="☕ Cafe & Coffee Shop">☕ Cafes</button>
        <button class="filter-btn" data-category="🍽️ Restaurant & Dining">🍽️ Restaurants</button>
        <button class="filter-btn" data-category="👗 Fashion & Clothing">👗 Fashion</button>
        <button class="filter-btn" data-category="🏦 Bank & Financial">🏦 Banks</button>
        <button class="filter-btn" data-category="🏥 Private Hospital & Clinic">🏥 Hospitals</button>
        <button class="filter-btn" data-category="🏫 University & College">🏫 Universities</button>
    </div>

    <div id="shopsList">
        <div class="loading">Loading businesses...</div>
    </div>
</div>

<div class="footer">
    <p>© 2026 Crimson Owl | Ethiopian Business Directory</p>
</div>

<script>
    const GITHUB_SHOPS_URL = 'https://raw.githubusercontent.com/ignivolatusapk/crimson-owl/main/shops.json';
    
    let shops = [];
    let currentCategory = 'all';
    let currentSearch = '';

    function getStarRating(rating) {
        const fullStars = Math.floor(rating);
        const hasHalfStar = rating % 1 >= 0.5;
        let stars = '';
        for (let i = 0; i < fullStars; i++) {
            stars += `<svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>`;
        }
        if (hasHalfStar) {
            stars += `<svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>`;
        }
        for (let i = stars.length / 24; i < 5; i++) {
            stars += `<svg viewBox="0 0 24 24" fill="none" stroke="#555"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>`;
        }
        return stars;
    }

    async function loadShops() {
        try {
            const response = await fetch(GITHUB_SHOPS_URL + '?t=' + Date.now());
            if (!response.ok) throw new Error();
            const data = await response.json();
            // Sort: featured first, then by rating
            shops = data.shops.filter(s => s.status === 'active').sort((a, b) => {
                if (a.featured && !b.featured) return -1;
                if (!a.featured && b.featured) return 1;
                return (b.rating || 0) - (a.rating || 0);
            });
            displayShops();
        } catch (error) {
            document.getElementById('shopsList').innerHTML = `<div class="empty-state"><p>⚠️ Unable to load businesses.</p></div>`;
        }
    }

    function displayShops() {
        let filtered = shops;
        if (currentCategory !== 'all') {
            filtered = filtered.filter(shop => shop.category === currentCategory);
        }
        if (currentSearch) {
            filtered = filtered.filter(shop =>
                shop.shopName.toLowerCase().includes(currentSearch) ||
                shop.category.toLowerCase().includes(currentSearch) ||
                shop.description.toLowerCase().includes(currentSearch)
            );
        }

        const container = document.getElementById('shopsList');
        if (filtered.length === 0) {
            container.innerHTML = `<div class="empty-state"><p>✨ No businesses found</p><a href="apply.html" style="color:#8B0000;">List Your Business →</a></div>`;
            return;
        }

        container.innerHTML = `<div class="shops-grid">${filtered.map(shop => `
            <div class="shop-card" onclick="viewBusiness(${shop.id})">
                ${shop.featured ? '<div class="featured-badge">FEATURED</div>' : ''}
                <img src="${shop.storePhoto || 'https://images.unsplash.com/photo-1441984904996-e0b6ba067e0b?w=400'}" class="shop-photo" onerror="this.src='https://images.unsplash.com/photo-1441984904996-e0b6ba067e0b?w=400'">
                <div class="shop-info">
                    <div class="shop-header">
                        ${shop.logoUrl ? `<img src="${shop.logoUrl}" class="shop-logo-img">` : `<div class="shop-logo-img" style="display:flex;align-items:center;justify-content:center;font-size:24px;">🏢</div>`}
                        <div>
                            <div class="shop-name">${shop.shopName}</div>
                            <div class="shop-category">${shop.category}</div>
                        </div>
                    </div>
                    <div class="shop-desc">${shop.description.substring(0, 100)}${shop.description.length > 100 ? '...' : ''}</div>
                    ${shop.rating ? `<div class="shop-rating"><div class="stars">${getStarRating(shop.rating)}</div><span class="rating-value">${shop.rating}</span><span class="reviews-count">(${shop.reviews || 0} reviews)</span></div>` : ''}
                    <div class="shop-details-link">View Details →</div>
                </div>
            </div>
        `).join('')}</div>`;
    }

    function viewBusiness(id) {
        window.location.href = `business-details.html?id=${id}`;
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentCategory = this.dataset.category;
            displayShops();
        });
    });

    document.getElementById('searchInput').addEventListener('keyup', () => {
        currentSearch = document.getElementById('searchInput').value.toLowerCase();
        displayShops();
    });

    function toggleMenu() {
        document.getElementById('mobileMenu').classList.toggle('show');
    }

    loadShops();
</script>

</body>
</html>
