<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>All Businesses - Crimson Owl</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --crimson: #8B0000;
            --crimson-light: #a52a2a;
            --text-dark: #1a1a1a;
            --text-medium: #4a4a4a;
            --text-light: #6c757d;
            --bg-white: #ffffff;
            --bg-off-white: #f8f9fa;
            --border-light: #e9ecef;
            --shadow-sm: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.05);
            --shadow-md: 0 0.5rem 1rem rgba(0, 0, 0, 0.05);
            --shadow-hover: 0 1rem 1.5rem rgba(0, 0, 0, 0.1);
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-off-white);
            color: var(--text-dark);
            line-height: 1.6;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 0.75rem 1.5rem;
            border-bottom: 1px solid var(--border-light);
        }

        .nav-container {
            max-width: 1280px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-logo img {
            height: 36px;
            width: auto;
        }

        .nav-logo span {
            color: var(--text-dark);
            font-weight: 700;
            font-size: 1.2rem;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-medium);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .nav-links a:hover {
            color: var(--crimson);
        }

        .apply-nav {
            background: var(--crimson);
            color: white !important;
            padding: 0.5rem 1.25rem;
            border-radius: 2rem;
        }

        .menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .mobile-menu {
            display: none;
            position: fixed;
            top: 65px;
            left: 0;
            right: 0;
            background: white;
            z-index: 999;
            padding: 1rem;
            border-bottom: 1px solid var(--border-light);
        }

        .mobile-menu.show {
            display: block;
        }

        .mobile-menu a {
            display: block;
            color: var(--text-dark);
            text-decoration: none;
            padding: 0.75rem;
            border-bottom: 1px solid var(--border-light);
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        .page-header {
            margin-bottom: 2rem;
            text-align: center;
        }

        .page-header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .page-header p {
            color: var(--text-light);
        }

        .search-box {
            width: 100%;
            max-width: 400px;
            padding: 0.75rem 1.25rem;
            background: var(--bg-white);
            border: 1px solid var(--border-light);
            border-radius: 2.5rem;
            font-size: 0.9rem;
            margin: 0 auto 1.5rem auto;
            display: block;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--crimson);
        }

        .category-filter {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            padding-bottom: 1rem;
            margin-bottom: 2rem;
            scrollbar-width: thin;
        }

        .filter-btn {
            background: var(--bg-white);
            border: 1px solid var(--border-light);
            color: var(--text-medium);
            padding: 0.5rem 1.25rem;
            border-radius: 2rem;
            cursor: pointer;
            font-size: 0.8rem;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .filter-btn.active {
            background: var(--crimson);
            color: white;
            border-color: var(--crimson);
        }

        .filter-btn:hover {
            background: var(--crimson);
            color: white;
        }

        .shops-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .shop-card {
            background: var(--bg-white);
            border: 1px solid var(--border-light);
            border-radius: 1.5rem;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
        }

        .shop-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
            border-color: transparent;
        }

        .featured-badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #000;
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            font-weight: bold;
            z-index: 2;
        }

        .shop-photo {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .shop-info {
            padding: 1.25rem;
        }

        .shop-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
        }

        .shop-logo-img {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            object-fit: cover;
        }

        .shop-name {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .shop-category {
            font-size: 0.75rem;
            color: var(--text-light);
        }

        .shop-desc {
            font-size: 0.85rem;
            color: var(--text-medium);
            line-height: 1.5;
            margin-bottom: 1rem;
        }

        .shop-details-link {
            color: var(--crimson);
            font-size: 0.85rem;
            font-weight: 500;
            text-decoration: none;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            background: var(--bg-white);
            border-radius: 1.5rem;
            color: var(--text-light);
        }

        .footer {
            background: var(--bg-white);
            padding: 2rem 1rem;
            text-align: center;
            border-top: 1px solid var(--border-light);
            margin-top: 2rem;
        }

        .footer p {
            color: var(--text-light);
            font-size: 0.8rem;
        }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .menu-btn { display: block; }
            .shops-grid { grid-template-columns: 1fr; }
            .container { padding: 1rem; }
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="nav-container">
        <div class="nav-logo">
            <img src="images/logo.png" alt="Crimson Owl Logo">
            <span>CRIMSON OWL</span>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="browse-shops.html">Businesses</a>
            <a href="apply.html" class="apply-nav">List Your Business</a>
        </div>
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
    </div>
</div>

<div class="mobile-menu" id="mobileMenu">
    <a href="index.html">Home</a>
    <a href="browse-shops.html">Businesses</a>
    <a href="apply.html">List Your Business</a>
</div>

<div class="container">
    <div class="page-header">
        <h1>All Businesses</h1>
        <p>Browse hotels, cafes, restaurants, shops and more in Ethiopia</p>
    </div>

    <input type="text" class="search-box" id="searchInput" placeholder="🔍 Search businesses...">

    <div class="category-filter" id="categoryFilter">
        <button class="filter-btn active" data-category="all">All</button>
        <button class="filter-btn" data-category="🏨 Hotel & Resort">🏨 Hotels</button>
        <button class="filter-btn" data-category="☕ Cafe & Coffee Shop">☕ Cafes</button>
        <button class="filter-btn" data-category="🍽️ Restaurant & Dining">🍽️ Restaurants</button>
        <button class="filter-btn" data-category="👗 Fashion & Clothing">👗 Fashion</button>
        <button class="filter-btn" data-category="🏦 Bank & Financial">🏦 Banks</button>
        <button class="filter-btn" data-category="🏥 Private Hospital & Clinic">🏥 Hospitals</button>
        <button class="filter-btn" data-category="🏫 University & College">🏫 Universities</button>
        <button class="filter-btn" data-category="🛒 Supermarket & Grocery">🛒 Supermarkets</button>
        <button class="filter-btn" data-category="🏋️ Gym & Fitness Center">🏋️ Gyms</button>
        <button class="filter-btn" data-category="📸 Photography Studio">📸 Photography</button>
    </div>

    <div id="shopsList">
        <div class="empty-state">Loading businesses...</div>
    </div>
</div>

<div class="footer">
    <p>© 2026 Crimson Owl | Ethiopian Business Directory</p>
</div>

<script>
    const GITHUB_SHOPS_URL = 'https://raw.githubusercontent.com/ignivolatusapk/crimson-owl/main/shops.json';
    
    let shops = [];
    let currentCategory = 'all';
    let currentSearch = '';

    async function loadShops() {
        try {
            const response = await fetch(GITHUB_SHOPS_URL + '?t=' + Date.now());
            if (!response.ok) throw new Error();
            const data = await response.json();
            shops = data.shops.filter(s => s.status === 'active').sort((a, b) => {
                if (a.featured && !b.featured) return -1;
                if (!a.featured && b.featured) return 1;
                return 0;
            });
            displayShops();
        } catch (error) {
            document.getElementById('shopsList').innerHTML = '<div class="empty-state">⚠️ Unable to load businesses. Please check back later.</div>';
        }
    }

    function displayShops() {
        let filtered = shops;
        if (currentCategory !== 'all') {
            filtered = filtered.filter(shop => shop.category === currentCategory);
        }
        if (currentSearch) {
            filtered = filtered.filter(shop =>
                shop.shopName.toLowerCase().includes(currentSearch) ||
                shop.category.toLowerCase().includes(currentSearch) ||
                shop.description.toLowerCase().includes(currentSearch)
            );
        }

        const container = document.getElementById('shopsList');
        if (filtered.length === 0) {
            container.innerHTML = '<div class="empty-state">✨ No businesses found</div>';
            return;
        }

        container.innerHTML = `
            <div class="shops-grid">
                ${filtered.map(shop => `
                    <div class="shop-card" onclick="viewBusiness(${shop.id})">
                        ${shop.featured ? '<div class="featured-badge">⭐ FEATURED</div>' : ''}
                        <img src="${shop.storePhoto || 'https://images.unsplash.com/photo-1441984904996-e0b6ba067e0b?w=400'}" class="shop-photo" onerror="this.src='https://images.unsplash.com/photo-1441984904996-e0b6ba067e0b?w=400'">
                        <div class="shop-info">
                            <div class="shop-header">
                                ${shop.logoUrl ? `<img src="${shop.logoUrl}" class="shop-logo-img">` : `<div class="shop-logo-img" style="display:flex;align-items:center;justify-content:center;font-size:24px;">🏢</div>`}
                                <div>
                                    <div class="shop-name">${shop.shopName}</div>
                                    <div class="shop-category">${shop.category}</div>
                                </div>
                            </div>
                            <div class="shop-desc">${shop.description.substring(0, 100)}${shop.description.length > 100 ? '...' : ''}</div>
                            <div class="shop-details-link">View Details →</div>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
    }

    function viewBusiness(id) {
        window.location.href = `business-details.html?id=${id}`;
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentCategory = this.dataset.category;
            displayShops();
        });
    });

    document.getElementById('searchInput').addEventListener('keyup', () => {
        currentSearch = document.getElementById('searchInput').value.toLowerCase();
        displayShops();
    });

    function toggleMenu() {
        document.getElementById('mobileMenu').classList.toggle('show');
    }

    loadShops();
</script>

</body>
</html>
